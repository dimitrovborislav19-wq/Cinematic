<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nano Awakening Intro</title>
    <style>
      :root {
        --bg0: #02020a;
        --bg1: #070a1b;
        --fg: #dbf4ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 50% 85%, var(--bg1) 0%, var(--bg0) 58%, #000 100%);
        color: var(--fg);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(145%) contrast(114%);
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: end center;
        pointer-events: none;
        padding: 2.4rem;
      }

      #status {
        opacity: 0;
        letter-spacing: 0.4rem;
        font-size: clamp(0.8rem, 1.9vw, 1.4rem);
        text-transform: uppercase;
        text-shadow: 0 0 24px rgba(130, 244, 255, 0.7), 0 0 70px rgba(178, 105, 255, 0.35);
        transition: opacity 540ms ease;
      }

      #status.show {
        opacity: 1;
      }

      #startBtn {
        position: fixed;
        top: 1.05rem;
        right: 1.05rem;
        pointer-events: auto;
        border: 1px solid rgba(132, 240, 255, 0.22);
        color: rgba(222, 248, 255, 0.84);
        background: rgba(1, 6, 15, 0.42);
        border-radius: 999px;
        padding: 0.65rem 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.68rem;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(58, 120, 255, 0.1);
        backdrop-filter: blur(6px);
      }

      #startBtn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="overlay">
      <div id="status" aria-live="polite"></div>
      <button id="startBtn">Begin</button>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");

      const DURATION = 5.8;
      const STAR_COUNT = 1400;
      const DUST_COUNT = 640;
      const FILAMENTS = 64;

      let width = 0;
      let height = 0;
      let raf = null;
      let startTime = 0;
      let running = false;

      const stars = Array.from({ length: STAR_COUNT }, () => ({
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        z: Math.random(),
        tw: Math.random() * Math.PI * 2,
        seed: Math.random(),
      }));

      const dust = Array.from({ length: DUST_COUNT }, () => ({
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        z: Math.random(),
        r: Math.random() * 1.4 + 0.15,
        p: Math.random() * Math.PI * 2,
        seed: Math.random(),
      }));

      const filaments = Array.from({ length: FILAMENTS }, (_, i) => ({
        band: i % 4,
        phase: Math.random() * Math.PI * 2,
        offset: Math.random() * Math.PI * 2,
        drift: Math.random() * 0.7 + 0.3,
      }));

      const clamp01 = (v) => Math.max(0, Math.min(1, v));

      function smoothstep(a, b, x) {
        const t = clamp01((x - a) / (b - a));
        return t * t * (3 - 2 * t);
      }

      function easeOutExpo(x) {
        return x >= 1 ? 1 : 1 - 2 ** (-10 * x);
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.width = Math.floor(window.innerWidth * dpr);
        height = canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      function flowField(x, y, t, seed = 0) {
        const a = Math.sin(x * 2.8 + t * 0.22 + seed * 6) + Math.cos(y * 3.1 - t * 0.19 - seed * 4);
        const b = Math.cos((x + y) * 2.2 - t * 0.17 + seed * 8);
        return {
          x: Math.sin(a + b) * 0.052,
          y: Math.cos(a * 0.8 - b) * 0.052,
        };
      }

      function project(p, t, tunnelPull, camX, camY) {
        const flow = flowField(p.x, p.y, t, p.seed || 0);
        const z = Math.max(0.04, p.z * (1 - tunnelPull * 0.34));
        const depth = 2.05 / z;
        const swirl = 0.07 * (0.22 + tunnelPull) * Math.sin(t * 0.72 + p.seed * 10 + z * 9);
        return {
          x: width * (0.5 + (p.x + swirl + flow.x + camX * z) * depth * 0.32),
          y: height * (0.5 + (p.y - swirl * 0.45 + flow.y + camY * z) * depth * 0.32),
          depth,
          z,
        };
      }

      function drawBackground(t) {
        const bloom = smoothstep(0.2, 3.8, t);
        const ascend = smoothstep(3.1, 5.55, t);
        const breath = 0.5 + Math.sin(t * 0.55) * 0.5;

        const g = ctx.createRadialGradient(
          width * (0.5 + Math.sin(t * 0.14) * 0.04),
          height * (0.56 - ascend * 0.08),
          width * (0.05 + bloom * 0.08),
          width * 0.5,
          height * 0.52,
          width * 0.9
        );
        g.addColorStop(0, `hsla(${260 + breath * 34}, 94%, ${15 + bloom * 20}%, 0.95)`);
        g.addColorStop(0.26, `hsla(${297 - breath * 18}, 88%, ${12 + bloom * 17}%, 0.86)`);
        g.addColorStop(0.56, `hsla(${196 + breath * 20}, 86%, ${8 + bloom * 10}%, 0.72)`);
        g.addColorStop(1, "rgba(0,0,0,0.99)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        const veilA = smoothstep(0.5, 3.2, t) * (1 - smoothstep(5.2, 5.8, t));
        if (veilA > 0) {
          const veil = ctx.createLinearGradient(0, 0, width, height);
          veil.addColorStop(0, `hsla(286, 88%, 52%, ${0.05 * veilA})`);
          veil.addColorStop(0.45, `hsla(196, 90%, 54%, ${0.08 * veilA})`);
          veil.addColorStop(1, `hsla(312, 84%, 50%, ${0.045 * veilA})`);
          ctx.fillStyle = veil;
          ctx.fillRect(0, 0, width, height);
        }
      }

      function drawStarField(t, camX, camY) {
        const wake = smoothstep(0.15, 2.2, t);
        const tunnel = smoothstep(1.25, 5.0, t);

        for (const p of stars) {
          const q = project(p, t, tunnel, camX, camY);
          if (q.x < -24 || q.x > width + 24 || q.y < -24 || q.y > height + 24) continue;

          const tw = 0.5 + 0.5 * Math.sin(t * (2.2 + p.seed) + p.tw + p.z * 8);
          const breathe = 0.5 + 0.5 * Math.sin(t * 0.9 + p.seed * 11);
          const size = (0.3 + (1 - p.z) * 2.15) * (0.5 + tunnel * 0.74) * q.depth * 0.56;
          const hue = 188 + 132 * (0.5 + 0.5 * Math.sin(p.seed * 12 + t * 0.18 + p.z * 5));
          const a = (0.04 + wake * 0.38) * (0.4 + tw * 0.75) * (0.5 + (1 - p.z)) * (0.85 + breathe * 0.2);

          ctx.fillStyle = `hsla(${hue}, 100%, ${66 + tw * 19}%, ${a})`;
          ctx.beginPath();
          ctx.arc(q.x, q.y, size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      function drawDust(t, camX, camY) {
        const emerge = smoothstep(0.1, 1.85, t);
        const awaken = smoothstep(2.3, 5.5, t);

        ctx.globalCompositeOperation = "lighter";
        for (const p of dust) {
          const flow = flowField(p.x * 1.3, p.y * 1.3, t * 1.2, p.seed);
          const driftX = Math.sin(t * 0.38 + p.p) * 0.05 + flow.x * (0.6 + awaken);
          const driftY = Math.cos(t * 0.41 + p.p * 0.9) * 0.045 + flow.y * (0.6 + awaken);
          const q = project({ ...p, x: p.x + driftX, y: p.y + driftY }, t, awaken * 0.68, camX * 1.35, camY * 1.35);
          if (q.x < -34 || q.x > width + 34 || q.y < -34 || q.y > height + 34) continue;

          const halo = p.r * q.depth * (0.9 + awaken * 1.2);
          const alpha = (0.012 + emerge * 0.065 + awaken * 0.036) * (1.2 - p.z);
          const hue = 186 + 124 * (0.5 + 0.5 * Math.sin(p.seed * 10 + t * 0.3));

          ctx.fillStyle = `hsla(${hue}, 100%, ${61 + p.z * 24}%, ${alpha})`;
          ctx.beginPath();
          ctx.arc(q.x, q.y, halo, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawFilamentStructures(t) {
        const reveal = smoothstep(0.75, 3.4, t);
        const sentient = smoothstep(2.6, 5.4, t);
        const cx = width * 0.5;
        const cy = height * 0.5;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.globalCompositeOperation = "lighter";

        for (const f of filaments) {
          const rot = t * (0.12 + f.band * 0.03) + f.offset;
          const arc = Math.PI * (0.45 + f.band * 0.11);
          const r0 = width * (0.08 + f.band * 0.05);

          const px = Math.cos(rot + f.phase) * r0;
          const py = Math.sin(rot * 1.2 - f.phase) * r0 * 0.55;
          const flow = flowField(px / width, py / height, t * 2.1, f.drift);

          const x1 = Math.cos(rot - arc) * r0;
          const y1 = Math.sin((rot - arc) * 1.35) * r0 * 0.6;
          const x2 = Math.cos(rot + arc) * r0;
          const y2 = Math.sin((rot + arc) * 1.35) * r0 * 0.6;

          const c1x = px + flow.x * width * (0.6 + sentient) + Math.cos(rot * 2.3 + f.phase) * width * 0.04;
          const c1y = py + flow.y * height * (0.6 + sentient) + Math.sin(rot * 1.9 - f.phase) * height * 0.03;
          const c2x = -c1x * 0.78;
          const c2y = -c1y * 0.78;

          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.bezierCurveTo(c1x, c1y, c2x, c2y, x2, y2);

          const hue = 188 + 125 * ((f.band + 1) / 5) + Math.sin(t * 0.4 + f.phase) * 18;
          const alpha = 0.012 + reveal * 0.056 + sentient * 0.095;
          ctx.strokeStyle = `hsla(${hue}, 98%, ${60 + f.band * 6}%, ${alpha})`;
          ctx.lineWidth = 0.55 + f.band * 0.28;
          ctx.stroke();
        }

        ctx.restore();
        ctx.globalCompositeOperation = "source-over";
      }

      function drawAwakeningCore(t) {
        const form = smoothstep(2.0, 4.25, t);
        const charge = smoothstep(3.7, 5.3, t);
        const transcend = smoothstep(5.08, 5.72, t);
        const cx = width * 0.5;
        const cy = height * 0.5;

        const orbR = width * (0.018 + 0.022 * form + 0.015 * charge);
        const pulse = 1 + 0.11 * Math.sin(t * 8.4 + Math.sin(t * 1.3));

        const aura = ctx.createRadialGradient(cx, cy, 0, cx, cy, orbR * (12 + charge * 4.5));
        aura.addColorStop(0, `rgba(180, 250, 255, ${0.52 * form + 0.26 * charge})`);
        aura.addColorStop(0.25, `rgba(132, 228, 255, ${0.28 * form + 0.22 * charge})`);
        aura.addColorStop(0.5, `rgba(160, 110, 255, ${0.22 * form + 0.2 * charge})`);
        aura.addColorStop(0.75, `rgba(255, 94, 223, ${0.1 * form + 0.12 * charge})`);
        aura.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = aura;
        ctx.beginPath();
        ctx.arc(cx, cy, orbR * (12 + charge * 4.5), 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 3; i++) {
          const wobble = 1 + Math.sin(t * (1.7 + i * 0.4) + i * 1.2) * 0.07;
          const rr = width * (0.09 + i * 0.055) * (1 + charge * 0.16) * wobble;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(t * (0.17 + i * 0.05) * (i % 2 ? -1 : 1));
          ctx.strokeStyle = `hsla(${196 + i * 48}, 96%, ${63 + i * 8}%, ${0.09 + form * 0.1 + charge * 0.12})`;
          ctx.lineWidth = 0.9 + i * 0.36;
          ctx.beginPath();
          ctx.ellipse(0, 0, rr, rr * (0.48 + i * 0.08), Math.sin(t * 0.6 + i), 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        ctx.fillStyle = `rgba(210, 252, 255, ${0.7 * form + 0.16 * charge})`;
        ctx.beginPath();
        ctx.arc(cx, cy, orbR * pulse, 0, Math.PI * 2);
        ctx.fill();

        if (transcend > 0) {
          const flash = easeOutExpo(transcend) * (1 - smoothstep(5.72, 5.8, t));
          const veil = ctx.createRadialGradient(cx, cy, 0, cx, cy, width * 0.86);
          veil.addColorStop(0, `rgba(222, 255, 255, ${flash * 0.34})`);
          veil.addColorStop(0.3, `rgba(196, 160, 255, ${flash * 0.24})`);
          veil.addColorStop(0.62, `rgba(138, 255, 255, ${flash * 0.14})`);
          veil.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = veil;
          ctx.fillRect(0, 0, width, height);
        }
      }

      function drawVignetteAndStatus(t) {
        const lock = smoothstep(5.05, 5.76, t);
        if (lock > 0) {
          statusEl.textContent = "WE ARE INSIDE THE DREAM";
          statusEl.style.opacity = String(lock * 0.9);
          statusEl.classList.toggle("show", lock > 0.12);
        }

        const v = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.28, width * 0.5, height * 0.5, width * 0.78);
        v.addColorStop(0, "rgba(0,0,0,0)");
        v.addColorStop(1, "rgba(0,0,0,0.46)");
        ctx.fillStyle = v;
        ctx.fillRect(0, 0, width, height);
      }

      function render(now) {
        const t = (now - startTime) / 1000;
        if (t > DURATION) {
          running = false;
          cancelAnimationFrame(raf);
          startBtn.classList.remove("hidden");
          return;
        }

        const camX = Math.sin(t * 0.24) * 0.02;
        const camY = Math.cos(t * 0.21 + Math.sin(t * 0.4)) * 0.018;

        ctx.clearRect(0, 0, width, height);
        drawBackground(t);
        drawStarField(t, camX, camY);
        drawDust(t, camX, camY);
        drawFilamentStructures(t);
        drawAwakeningCore(t);
        drawVignetteAndStatus(t);

        raf = requestAnimationFrame(render);
      }

      function playAudio() {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const master = audio.createGain();
        master.gain.value = 0.19;
        master.connect(audio.destination);

        const now = audio.currentTime;

        const makeNoise = () => {
          const b = audio.createBuffer(1, audio.sampleRate * DURATION, audio.sampleRate);
          const d = b.getChannelData(0);
          let lp = 0;
          for (let i = 0; i < d.length; i++) {
            lp = lp * 0.986 + (Math.random() * 2 - 1) * 0.06;
            d[i] = lp;
          }
          return b;
        };

        const cosmic = audio.createBufferSource();
        cosmic.buffer = makeNoise();
        const cosmicFilter = audio.createBiquadFilter();
        cosmicFilter.type = "bandpass";
        cosmicFilter.frequency.setValueAtTime(420, now);
        cosmicFilter.frequency.exponentialRampToValueAtTime(2600, now + 5.4);
        cosmicFilter.Q.value = 0.8;
        const cosmicGain = audio.createGain();
        cosmicGain.gain.setValueAtTime(0.0001, now);
        cosmicGain.gain.exponentialRampToValueAtTime(0.11, now + 1.4);
        cosmicGain.gain.linearRampToValueAtTime(0.05, now + DURATION);
        cosmic.connect(cosmicFilter).connect(cosmicGain).connect(master);

        const sub = audio.createOscillator();
        sub.type = "sine";
        sub.frequency.setValueAtTime(44, now);
        sub.frequency.linearRampToValueAtTime(64, now + 5.2);
        const subGain = audio.createGain();
        subGain.gain.setValueAtTime(0.0001, now);
        subGain.gain.exponentialRampToValueAtTime(0.2, now + 1.3);
        subGain.gain.linearRampToValueAtTime(0.12, now + DURATION);
        sub.connect(subGain).connect(master);

        const chordFreq = [174.61, 261.63, 392.0];
        chordFreq.forEach((f, i) => {
          const osc = audio.createOscillator();
          osc.type = i === 2 ? "triangle" : "sine";
          osc.frequency.setValueAtTime(f, now + 0.85);
          osc.frequency.exponentialRampToValueAtTime(f * (1.5 + i * 0.14), now + 5.25);
          const g = audio.createGain();
          g.gain.setValueAtTime(0.0001, now + 0.8);
          g.gain.exponentialRampToValueAtTime(0.03 + i * 0.012, now + 2.2 + i * 0.2);
          g.gain.linearRampToValueAtTime(0.02, now + 4.8);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 5.72);
          osc.connect(g).connect(master);
          osc.start(now + 0.8);
          osc.stop(now + 5.76);
        });

        for (let i = 0; i < 9; i++) {
          const ping = audio.createOscillator();
          ping.type = "sine";
          const at = now + 1.2 + i * 0.42 + Math.random() * 0.06;
          ping.frequency.setValueAtTime(620 + Math.random() * 1400, at);
          ping.frequency.exponentialRampToValueAtTime(240 + Math.random() * 180, at + 0.16);
          const pg = audio.createGain();
          pg.gain.setValueAtTime(0.0001, at);
          pg.gain.exponentialRampToValueAtTime(0.026, at + 0.02);
          pg.gain.exponentialRampToValueAtTime(0.0001, at + 0.22);
          ping.connect(pg).connect(master);
          ping.start(at);
          ping.stop(at + 0.24);
        }

        const bloom = audio.createOscillator();
        bloom.type = "sawtooth";
        bloom.frequency.setValueAtTime(312, now + 5.03);
        bloom.frequency.exponentialRampToValueAtTime(72, now + 5.54);
        const bloomGain = audio.createGain();
        bloomGain.gain.setValueAtTime(0.0001, now + 4.98);
        bloomGain.gain.exponentialRampToValueAtTime(0.32, now + 5.08);
        bloomGain.gain.exponentialRampToValueAtTime(0.0001, now + 5.74);
        bloom.connect(bloomGain).connect(master);

        cosmic.start(now);
        sub.start(now);
        bloom.start(now + 5.0);

        cosmic.stop(now + DURATION + 0.1);
        sub.stop(now + DURATION + 0.1);
        bloom.stop(now + 5.76);
      }

      function start() {
        if (running) return;
        running = true;
        statusEl.classList.remove("show");
        statusEl.style.opacity = "0";
        statusEl.textContent = "";
        startBtn.classList.add("hidden");
        startTime = performance.now();
        playAudio();
        raf = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      startBtn.addEventListener("click", start);
      resize();
    </script>
  </body>
</html>
