<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Classified System Startup</title>
    <style>
      :root {
        --bg-0: #010307;
        --bg-1: #031019;
        --bg-2: #06222a;
        --line: #63d7da;
        --line-soft: #4da6af;
        --text: #d2f4f4;
        --warn: #ff4d58;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at 50% 65%, #07171f 0%, #02070c 48%, #000 100%);
        color: var(--text);
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(95%) contrast(110%);
      }

      .ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      #label {
        position: absolute;
        left: 50%;
        bottom: clamp(1rem, 4vh, 2rem);
        transform: translateX(-50%);
        min-width: min(82vw, 46rem);
        padding: 0.45rem 0.85rem;
        border: 1px solid rgba(99, 215, 218, 0.32);
        background: linear-gradient(90deg, rgba(1, 8, 14, 0.15), rgba(5, 22, 30, 0.6), rgba(1, 8, 14, 0.15));
        text-align: center;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-size: clamp(0.52rem, 0.98vw, 0.82rem);
        text-shadow: 0 0 14px rgba(93, 195, 198, 0.4);
        color: rgba(210, 244, 244, 0.95);
        opacity: 0;
      }

      #label.warn {
        border-color: rgba(255, 77, 88, 0.5);
        color: rgba(255, 221, 224, 0.96);
        text-shadow: 0 0 14px rgba(255, 77, 88, 0.45);
      }

      #boot {
        position: absolute;
        left: 50%;
        top: 66%;
        transform: translate(-50%, -50%);
        width: min(52vw, 560px);
        opacity: 0;
      }

      #boot .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
        letter-spacing: 0.16em;
        font-size: clamp(0.5rem, 1vw, 0.74rem);
        color: rgba(183, 232, 236, 0.87);
        margin-bottom: 0.5rem;
      }

      #boot .bar {
        height: 6px;
        border: 1px solid rgba(89, 175, 180, 0.46);
        background: rgba(2, 10, 14, 0.8);
        position: relative;
      }

      #boot .fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0%;
        background: linear-gradient(90deg, rgba(88, 198, 204, 0.55), rgba(144, 249, 252, 0.9));
        box-shadow: 0 0 16px rgba(101, 223, 227, 0.55);
      }

      #startBtn {
        position: fixed;
        top: 1rem;
        right: 1rem;
        pointer-events: auto;
        border-radius: 999px;
        cursor: pointer;
        border: 1px solid rgba(98, 203, 210, 0.46);
        background: rgba(2, 11, 18, 0.72);
        color: rgba(213, 244, 245, 0.94);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-size: 0.68rem;
        padding: 0.64rem 0.96rem;
      }

      #startBtn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="ui">
      <div id="boot" aria-hidden="true">
        <div class="row"><span>LOADING</span><span id="bootPct">0%</span></div>
        <div class="bar"><div id="bootFill" class="fill"></div></div>
      </div>
      <div id="label" aria-live="polite"></div>
      <button id="startBtn">Awaken System</button>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");
      const label = document.getElementById("label");
      const boot = document.getElementById("boot");
      const bootFill = document.getElementById("bootFill");
      const bootPct = document.getElementById("bootPct");
      const startBtn = document.getElementById("startBtn");

      const DURATION = 23.5;
      const SCENES = [
        { k: "dormant", s: 0.0, e: 3.0, label: "DORMANT FIELD" },
        { k: "bridge1", s: 2.7, e: 4.1, label: "SIGNAL ROUTING" },
        { k: "retina", s: 3.8, e: 7.0, label: "RETINA SCAN", warn: true },
        { k: "bridge2", s: 6.7, e: 8.0, label: "CALIBRATING" },
        { k: "loading", s: 7.7, e: 11.6, label: "LOADING" },
        { k: "bridge3", s: 11.2, e: 12.8, label: "SIGNAL ROUTING" },
        { k: "command", s: 12.4, e: 16.2, label: "COMMAND CORE" },
        { k: "bridge4", s: 15.8, e: 17.2, label: "LINK STABLE" },
        { k: "global", s: 16.8, e: 20.7, label: "GLOBAL AWARENESS" },
        { k: "ready", s: 20.3, e: 23.5, label: "SYSTEM READY" },
      ];

      const particles = Array.from({ length: 180 }, () => ({
        x: Math.random(),
        y: Math.random(),
        z: Math.random(),
        o: Math.random() * Math.PI * 2,
      }));

      let w = 0;
      let h = 0;
      let start = 0;
      let running = false;
      let raf = null;

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const smooth = (a, b, x) => {
        const t = clamp01((x - a) / (b - a));
        return t * t * (3 - 2 * t);
      };
      const sceneWeight = (t, s, e, p = 0.38) => smooth(s - p, s + p, t) * (1 - smooth(e - p, e + p, t));

      function levels(t) {
        const out = {};
        for (const sc of SCENES) out[sc.k] = sceneWeight(t, sc.s, sc.e);
        return out;
      }

      function activeScene(t) {
        let best = null;
        let max = 0;
        for (const sc of SCENES) {
          const wv = sceneWeight(t, sc.s, sc.e, 0.2);
          if (wv > max) {
            max = wv;
            best = sc;
          }
        }
        return max > 0.05 ? best : null;
      }

      function resize() {
        const dpr = Math.min(devicePixelRatio || 1, 2);
        w = canvas.width = Math.floor(innerWidth * dpr);
        h = canvas.height = Math.floor(innerHeight * dpr);
        canvas.style.width = `${innerWidth}px`;
        canvas.style.height = `${innerHeight}px`;
      }

      function drawBase(t, l) {
        const energy = l.retina * 0.2 + l.loading * 0.35 + l.command * 0.6 + l.global * 0.75 + l.ready * 0.82;
        const g = ctx.createRadialGradient(w * 0.5, h * 0.58, w * 0.03, w * 0.5, h * 0.55, w * 0.84);
        g.addColorStop(0, `rgba(${5 + energy * 20}, ${18 + energy * 42}, ${22 + energy * 36}, 0.96)`);
        g.addColorStop(0.55, `rgba(${2 + energy * 8}, ${8 + energy * 12}, ${12 + energy * 14}, 0.97)`);
        g.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);

        for (const p of particles) {
          const x = p.x * w + Math.sin(t * 0.12 + p.o) * 4;
          const y = p.y * h + Math.cos(t * 0.1 + p.o) * 3;
          const a = (0.02 + p.z * 0.11) * (0.5 + 0.5 * Math.sin(t + p.o));
          ctx.fillStyle = `rgba(113,213,220,${a})`;
          ctx.fillRect(x, y, 1 + p.z, 1 + p.z);
        }
      }

      function drawDormant(t, a) {
        if (a < 0.02) return;
        ctx.save();
        ctx.globalAlpha = a;
        const cell = Math.max(40, Math.min(w, h) * 0.07);
        ctx.strokeStyle = "rgba(79,153,162,0.15)";
        ctx.lineWidth = 1;
        for (let y = -cell; y < h + cell; y += cell) {
          ctx.beginPath();
          ctx.moveTo(0, y + Math.sin((t + y) * 0.02) * 6);
          ctx.lineTo(w, y + Math.cos((t + y) * 0.02) * 6);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBridge(t, a, id) {
        if (a < 0.02) return;
        ctx.save();
        ctx.globalAlpha = a;
        const drift = (t * (24 + id * 4)) % (w * 0.35);
        ctx.strokeStyle = "rgba(98,190,195,0.2)";
        ctx.lineWidth = 1;
        for (let i = -2; i < 6; i++) {
          const x = i * w * 0.24 + drift - w * 0.25;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x + w * 0.18, h);
          ctx.stroke();
        }
        for (let i = 0; i < 6; i++) {
          const y = (i / 5) * h;
          const pulse = 0.3 + 0.7 * Math.sin(t * 2.1 + i + id);
          ctx.strokeStyle = `rgba(88,175,183,${0.07 + pulse * 0.12})`;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(w, y + Math.sin(t * 1.5 + i) * 10);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawRetina(t, a) {
        if (a < 0.02) return;
        const cx = w * 0.5;
        const cy = h * 0.47;
        const pulse = 0.75 + Math.sin(t * 3.2) * 0.12;
        const r = Math.min(w, h) * 0.06 * pulse;

        ctx.save();
        ctx.globalAlpha = a;

        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 4);
        glow.addColorStop(0, "rgba(148,242,246,0.38)");
        glow.addColorStop(0.45, "rgba(67,168,176,0.18)");
        glow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.translate(cx, cy);
        for (let i = 0; i < 3; i++) {
          ctx.save();
          ctx.rotate(t * (0.3 + i * 0.1) * (i % 2 ? -1 : 1));
          ctx.strokeStyle = `rgba(117,222,227,${0.26 - i * 0.06})`;
          ctx.lineWidth = 1.2;
          ctx.setLineDash([18 + i * 7, 10 + i * 3]);
          ctx.beginPath();
          ctx.arc(0, 0, r * (1.2 + i * 0.7), 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        ctx.setLineDash([]);
        const aperture = 0.35 + 0.2 * Math.sin(t * 2.7);
        ctx.strokeStyle = "rgba(163,244,246,0.75)";
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.76, 0, Math.PI * 2);
        ctx.stroke();

        const blades = 6;
        for (let i = 0; i < blades; i++) {
          const ang = (i / blades) * Math.PI * 2 + t * 0.5;
          ctx.strokeStyle = "rgba(115,200,206,0.62)";
          ctx.beginPath();
          ctx.moveTo(Math.cos(ang) * r * 0.2, Math.sin(ang) * r * 0.2);
          ctx.lineTo(Math.cos(ang + aperture) * r * 0.72, Math.sin(ang + aperture) * r * 0.72);
          ctx.stroke();
        }

        const sweep = ((t * 0.7) % 1) * Math.PI * 2;
        ctx.strokeStyle = "rgba(255,77,88,0.46)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, r * 1.5, sweep - 0.24, sweep + 0.24);
        ctx.stroke();

        ctx.restore();
      }

      function loadingProgress(t) {
        const s = 7.7;
        const e = 11.6;
        const x = clamp01((t - s) / (e - s));
        const ease = x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        const jitter = (Math.sin(t * 19) + Math.cos(t * 11)) * 0.008;
        return clamp01(ease + jitter * (1 - x));
      }

      function drawLoading(t, a) {
        const p = loadingProgress(t);
        boot.style.opacity = String(a * 0.95);
        bootFill.style.width = `${(p * 100).toFixed(1)}%`;
        bootPct.textContent = `${Math.round(p * 100)}%`;

        if (a < 0.02) return;
        const y = h * 0.66;
        ctx.save();
        ctx.globalAlpha = a;
        ctx.strokeStyle = "rgba(92,185,190,0.24)";
        for (let i = 0; i < 12; i++) {
          const x = w * 0.25 + i * (w * 0.5 / 11);
          const up = Math.sin(t * 2.5 + i) * h * 0.01;
          ctx.beginPath();
          ctx.moveTo(x, y - 34 + up);
          ctx.lineTo(x, y - 12 + up * 0.3);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawCommand(t, a) {
        if (a < 0.02) return;
        const cx = w * 0.5;
        const cy = h * 0.46;
        const baseR = Math.min(w, h) * 0.13;

        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(cx, cy);

        for (let i = 0; i < 4; i++) {
          ctx.save();
          ctx.rotate(t * (0.15 + i * 0.1) * (i % 2 ? -1 : 1));
          ctx.strokeStyle = `rgba(102,211,215,${0.17 + i * 0.06})`;
          ctx.lineWidth = 1.4;
          ctx.setLineDash([30 - i * 4, 12 + i * 3]);
          ctx.beginPath();
          ctx.arc(0, 0, baseR * (0.6 + i * 0.28), 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        ctx.setLineDash([]);

        const locks = 8;
        for (let i = 0; i < locks; i++) {
          const ang = (i / locks) * Math.PI * 2 + t * 0.12;
          const lockTravel = smooth(13, 15.7, t);
          const r = baseR * (0.58 + lockTravel * 0.5);
          ctx.fillStyle = "rgba(136,236,239,0.62)";
          ctx.fillRect(Math.cos(ang) * r - 2, Math.sin(ang) * r - 2, 4, 4);
        }

        ctx.strokeStyle = "rgba(156,247,249,0.8)";
        ctx.lineWidth = 1.8;
        ctx.beginPath();
        ctx.arc(0, 0, baseR * (0.36 + Math.sin(t * 1.8) * 0.03), 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      function drawGlobal(t, a) {
        if (a < 0.02) return;
        const cx = w * 0.5;
        const cy = h * 0.48;
        const R = Math.min(w, h) * 0.2;

        ctx.save();
        ctx.globalAlpha = a;
        ctx.translate(cx, cy);
        ctx.rotate(t * 0.08);

        ctx.strokeStyle = "rgba(112,214,219,0.34)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(0, 0, R, 0, Math.PI * 2);
        ctx.stroke();

        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.ellipse(0, 0, R * Math.cos(i * 0.24), R, 0, 0, Math.PI * 2);
          ctx.stroke();
        }
        for (let i = -2; i <= 2; i++) {
          ctx.beginPath();
          ctx.ellipse(0, 0, R, R * Math.cos(i * 0.24), 0, 0, Math.PI * 2);
          ctx.stroke();
        }

        const points = 26;
        for (let i = 0; i < points; i++) {
          const a0 = (i / points) * Math.PI * 2 + Math.sin(t * 0.6 + i) * 0.08;
          const lat = Math.sin(t * 0.3 + i * 1.7) * 0.8;
          const x = Math.cos(a0) * R * Math.cos(lat * 0.55);
          const y = Math.sin(a0) * R * 0.72;
          ctx.fillStyle = "rgba(157,239,242,0.8)";
          ctx.fillRect(x - 1.5, y - 1.5, 3, 3);

          if (i % 7 === 0) {
            ctx.strokeStyle = "rgba(255,77,88,0.52)";
            ctx.strokeRect(x - 6, y - 6, 12, 12);
          }
        }

        ctx.restore();
      }

      function drawReady(t, a) {
        if (a < 0.02) return;
        ctx.save();
        ctx.globalAlpha = a;
        const cx = w * 0.5;
        const cy = h * 0.48;
        const halo = Math.min(w, h) * 0.34;
        const pulse = 0.5 + 0.5 * Math.sin(t * 2.2);

        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, halo);
        g.addColorStop(0, `rgba(120,235,238,${0.1 + pulse * 0.1})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, halo, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawVignette() {
        const g = ctx.createRadialGradient(w * 0.5, h * 0.55, h * 0.35, w * 0.5, h * 0.55, h * 0.9);
        g.addColorStop(0, "rgba(0,0,0,0)");
        g.addColorStop(1, "rgba(0,0,0,0.64)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, w, h);
      }

      function runAudio() {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        const ac = new Ctx();

        const master = ac.createGain();
        master.gain.value = 0.16;
        master.connect(ac.destination);

        const hum = ac.createOscillator();
        hum.type = "sine";
        hum.frequency.value = 40;
        const humGain = ac.createGain();
        humGain.gain.value = 0.08;
        hum.connect(humGain).connect(master);

        const noiseBuf = ac.createBuffer(1, ac.sampleRate * 0.06, ac.sampleRate);
        const nData = noiseBuf.getChannelData(0);
        for (let i = 0; i < nData.length; i++) nData[i] = (Math.random() * 2 - 1) * Math.exp(-i / 130);

        const ticks = [4.1, 4.7, 5.2, 6.0, 8.2, 8.8, 9.4, 10.0, 10.7, 12.1, 13.7, 15.4, 17.6, 19.8];
        ticks.forEach((t0) => {
          const src = ac.createBufferSource();
          src.buffer = noiseBuf;
          const g = ac.createGain();
          g.gain.value = 0.06;
          src.connect(g).connect(master);
          src.start(ac.currentTime + t0);
        });

        const scan = ac.createOscillator();
        scan.type = "triangle";
        scan.frequency.setValueAtTime(220, ac.currentTime + 4);
        scan.frequency.exponentialRampToValueAtTime(560, ac.currentTime + 6.2);
        const scanGain = ac.createGain();
        scanGain.gain.setValueAtTime(0.0001, ac.currentTime + 3.9);
        scanGain.gain.exponentialRampToValueAtTime(0.09, ac.currentTime + 4.2);
        scanGain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 6.5);
        scan.connect(scanGain).connect(master);

        const ready = ac.createOscillator();
        ready.type = "square";
        ready.frequency.setValueAtTime(480, ac.currentTime + 21.3);
        ready.frequency.linearRampToValueAtTime(640, ac.currentTime + 21.8);
        const readyGain = ac.createGain();
        readyGain.gain.setValueAtTime(0.0001, ac.currentTime + 21.2);
        readyGain.gain.exponentialRampToValueAtTime(0.11, ac.currentTime + 21.45);
        readyGain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 22.2);
        ready.connect(readyGain).connect(master);

        hum.start();
        scan.start(ac.currentTime + 3.9);
        ready.start(ac.currentTime + 21.2);
        hum.stop(ac.currentTime + DURATION + 0.3);
        scan.stop(ac.currentTime + 6.6);
        ready.stop(ac.currentTime + 22.3);
      }

      function render(now) {
        const t = (now - start) / 1000;
        const l = levels(t);
        ctx.clearRect(0, 0, w, h);

        drawBase(t, l);
        drawDormant(t, l.dormant);
        drawBridge(t, l.bridge1, 1);
        drawRetina(t, l.retina);
        drawBridge(t, l.bridge2, 2);
        drawLoading(t, l.loading);
        drawBridge(t, l.bridge3, 3);
        drawCommand(t, l.command);
        drawBridge(t, l.bridge4, 4);
        drawGlobal(t, l.global);
        drawReady(t, l.ready);
        drawVignette();

        const sc = activeScene(t);
        if (sc) {
          label.textContent = sc.label;
          label.classList.toggle("warn", !!sc.warn);
          label.style.opacity = String(Math.max(0.2, sceneWeight(t, sc.s, sc.e, 0.2)));
        } else {
          label.style.opacity = "0";
        }

        if (l.loading < 0.05) boot.style.opacity = "0";

        if (t < DURATION) {
          raf = requestAnimationFrame(render);
        } else {
          running = false;
          startBtn.classList.remove("hidden");
          label.style.opacity = "1";
          label.textContent = "SYSTEM READY";
          boot.style.opacity = "0";
        }
      }

      function startSequence() {
        if (running) return;
        running = true;
        startBtn.classList.add("hidden");
        runAudio();
        start = performance.now();
        raf = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      startBtn.addEventListener("click", startSequence);
      resize();
    </script>
  </body>
</html>
