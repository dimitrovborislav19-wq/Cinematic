<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Awakening Sequence</title>
    <style>
      :root {
        --bg: #03050e;
        --fg: #d2f4ff;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 50% 66%, #040710 0%, #02040a 42%, #000 100%);
        color: var(--fg);
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(92%) contrast(116%);
      }

      .ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      #status {
        position: absolute;
        left: 50%;
        bottom: clamp(1.2rem, 4vh, 2.3rem);
        transform: translateX(-50%);
        min-width: min(90vw, 42rem);
        text-align: center;
        padding: 0.42rem 0.8rem;
        letter-spacing: 0.23em;
        text-transform: uppercase;
        font-size: clamp(0.52rem, 1.06vw, 0.9rem);
        opacity: 0;
        color: rgba(208, 236, 248, 0.9);
        border: 1px solid rgba(84, 166, 204, 0.2);
        background: linear-gradient(90deg, rgba(2, 9, 20, 0.18), rgba(4, 16, 32, 0.45), rgba(2, 9, 20, 0.18));
        text-shadow: 0 0 16px rgba(66, 148, 189, 0.45);
      }

      #status.alert {
        border-color: rgba(255, 80, 90, 0.48);
        color: rgba(255, 202, 202, 0.98);
        text-shadow: 0 0 18px rgba(255, 72, 72, 0.68);
      }

      #startBtn {
        position: fixed;
        top: 1rem;
        right: 1rem;
        pointer-events: auto;
        border: 1px solid rgba(108, 196, 255, 0.35);
        color: rgba(214, 247, 255, 0.92);
        background: rgba(2, 8, 20, 0.62);
        border-radius: 999px;
        padding: 0.68rem 0.98rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.68rem;
        cursor: pointer;
      }

      #startBtn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="ui">
      <div id="status" aria-live="polite"></div>
      <button id="startBtn">Awaken</button>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");

      const DURATION = 11.8;
      const STAR_COUNT = 320;
      const NODE_COUNT = 120;
      const PANEL_COUNT = 14;
      const GRID_FRAGS = 36;
      const LABELS = [
        ["DORMANT FIELD", false],
        ["INITIALIZING", false],
        ["POWER ROUTING", false],
        ["SIGNAL ACQUISITION", false],
        ["CORE CALIBRATION", false],
        ["VECTOR ALIGNMENT", false],
        ["SENSOR SWEEP", false],
        ["SYNAPTIC MAP LOADING", false],
        ["TARGET GEOMETRY LOCK", true],
        ["SUBSYSTEM LINK", false],
        ["NEURAL BUS ONLINE", false],
        ["AUTHORITY LAYER ACTIVE", true],
        ["PRIMARY CORE ONLINE", false],
        ["COMMAND LINK READY", false],
        ["SYSTEM AWAKE", false],
      ];
      const LOADING_SUBTASKS = [
        "CALIBRATING",
        "SYNCHRONIZING",
        "ROUTING POWER",
        "CORE LINK",
        "SIGNAL LOCK",
        "INITIALIZING SUBSYSTEMS",
      ];
      const PHASE_BEATS = [1.25, 2.9, 4.75, 7.15, 8.85, 10.35];

      let width = 0;
      let height = 0;
      let raf = null;
      let running = false;
      let startTime = 0;

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const smooth = (a, b, x) => {
        const t = clamp01((x - a) / (b - a));
        return t * t * (3 - 2 * t);
      };
      const pulse = (t, s, p, e) => smooth(s, p, t) * (1 - smooth(p, e, t));

      function stage(t, s, e, padIn = 0.45, padOut = 0.45) {
        return smooth(s - padIn, s + padIn, t) * (1 - smooth(e - padOut, e + padOut, t));
      }

      function stageLevels(t) {
        return {
          dormant: stage(t, 0.0, 2.0),
          ignite: stage(t, 1.2, 3.2),
          init: stage(t, 2.6, 5.2),
          scan: stage(t, 4.6, 7.7),
          core: stage(t, 7.1, 9.9),
          awake: stage(t, 9.5, 11.4),
        };
      }

      const stars = Array.from({ length: STAR_COUNT }, () => ({
        a: Math.random() * Math.PI * 2,
        r: 0.08 + Math.random() * 0.96,
        z: Math.random(),
        tw: Math.random() * 20,
      }));

      const nodes = Array.from({ length: NODE_COUNT }, (_, i) => ({
        ring: 0.2 + (i % 11) / 13 + Math.random() * 0.06,
        a: (i / NODE_COUNT) * Math.PI * 2 + Math.random() * 0.15,
        speed: 0.25 + Math.random() * 1.3,
        seed: Math.random(),
      }));

      const panels = Array.from({ length: PANEL_COUNT }, (_, i) => ({
        side: i % 2 ? 1 : -1,
        y: 0.16 + (i / PANEL_COUNT) * 0.68,
        w: 0.08 + Math.random() * 0.12,
        h: 0.02 + Math.random() * 0.038,
        seed: Math.random(),
      }));

      const fragments = Array.from({ length: GRID_FRAGS }, () => ({
        x: Math.random(),
        y: Math.random(),
        w: 0.04 + Math.random() * 0.07,
        h: 0.02 + Math.random() * 0.06,
        phase: Math.random() * 6,
      }));

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.width = Math.floor(window.innerWidth * dpr);
        height = canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      function drawBackground(t, l) {
        const glow = l.init * 0.22 + l.scan * 0.52 + l.core * 0.84 + l.awake * 0.68;
        const g = ctx.createRadialGradient(width * 0.5, height * 0.54, 4, width * 0.5, height * 0.52, width * 0.95);
        g.addColorStop(0, `rgba(${4 + glow * 18},${9 + glow * 22},${20 + glow * 52},0.98)`);
        g.addColorStop(0.5, `rgba(${2 + l.ignite * 4},${6 + l.scan * 14},${12 + glow * 18},0.97)`);
        g.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        const haze = ctx.createLinearGradient(0, 0, 0, height);
        haze.addColorStop(0, `rgba(2,7,17,${0.26 + l.ignite * 0.16})`);
        haze.addColorStop(0.52, `rgba(3,10,25,${0.2 + l.scan * 0.15 + l.core * 0.16})`);
        haze.addColorStop(1, `rgba(0,0,0,${0.58 + l.awake * 0.2})`);
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, width, height);

        const lineAlpha = 0.01 + l.scan * 0.024 + l.awake * 0.014;
        ctx.fillStyle = `rgba(84,146,196,${lineAlpha * 0.82})`;
        for (let i = 0; i < 30; i++) {
          const y = ((i * 33 + t * 76) % (height + 120)) - 60;
          ctx.fillRect(0, y, width, 1);
        }
      }

      function drawDormantField(t, l) {
        const amount = 0.14 + l.ignite * 0.3 + l.init * 0.4 + l.scan * 0.6;
        ctx.globalCompositeOperation = "lighter";
        for (const s of stars) {
          const a = s.a + t * (0.04 + s.z * 0.24);
          const radius = Math.min(width, height) * (0.1 + s.r * 0.6);
          const x = width * 0.5 + Math.cos(a) * radius * (1 + s.z * 0.2);
          const y = height * 0.52 + Math.sin(a * (1.1 + s.z * 0.3) + s.tw) * radius * 0.62;
          const tw = 0.4 + 0.6 * Math.sin(t * 2 + s.tw);
          const alpha = amount * tw * (0.16 + s.z * 0.4);
          ctx.fillStyle = `rgba(${150 + l.awake * 70}, ${200 + l.core * 55}, 255, ${alpha})`;
          ctx.fillRect(x, y, 1 + s.z * 1.8, 1 + s.z * 1.8);
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawOperationalGrid(t, l) {
        const active = l.init + l.scan + l.core + l.awake;
        if (active < 0.02) return;
        const discipline = 1 - l.core * 0.42;

        ctx.save();
        ctx.globalAlpha = (0.12 + active * 0.14) * discipline;
        ctx.strokeStyle = `rgba(90,190,255,${(0.08 + active * 0.18) * discipline})`;
        ctx.lineWidth = 1;

        const spacing = Math.max(24, Math.min(width, height) * 0.045);
        const drift = (t * 16) % spacing;
        for (let x = -spacing; x < width + spacing; x += spacing) {
          ctx.beginPath();
          ctx.moveTo(x + drift, 0);
          ctx.lineTo(x + drift, height);
          ctx.stroke();
        }
        for (let y = -spacing; y < height + spacing; y += spacing) {
          ctx.beginPath();
          ctx.moveTo(0, y + drift * 0.55);
          ctx.lineTo(width, y + drift * 0.55);
          ctx.stroke();
        }

        for (const f of fragments) {
          const ph = Math.sin(t * (1.2 + f.phase) + f.phase * 4);
          if (ph < 0.2) continue;
          const x = width * (0.1 + f.x * 0.8);
          const y = height * (0.1 + f.y * 0.8);
          const w = width * f.w;
          const h = height * f.h;
          ctx.fillStyle = `rgba(115,225,255,${(0.06 + active * 0.14) * ph * discipline})`;
          ctx.fillRect(x, y, w, h);
        }
        ctx.restore();
      }

      function drawShuttersAndPanels(t, l) {
        const p = l.ignite + l.init + l.scan + l.core + l.awake;
        if (p < 0.02) return;

        const aperture = smooth(1.1, 3.4, t) * (1 - smooth(8.9, 10.8, t));
        const close = smooth(8.4, 10.3, t);
        const topY = lerp(height * 0.03, height * 0.22, aperture) - close * height * 0.08;
        const botY = lerp(height * 0.97, height * 0.78, aperture) + close * height * 0.08;
        ctx.fillStyle = `rgba(2,8,22,${0.62 + p * 0.2})`;
        ctx.fillRect(0, 0, width, topY);
        ctx.fillRect(0, botY, width, height - botY);

        for (const panel of panels) {
          const flow = 0.5 + 0.5 * Math.sin(t * (1.7 + panel.seed * 3.4) + panel.seed * 9);
          const online = clamp01(l.init * 0.6 + l.scan * 0.9 + l.awake * 1.1 - panel.seed * 0.35);
          const x = width * (panel.side < 0 ? 0.03 : 0.97 - panel.w) + panel.side * Math.sin(t * 0.62 + panel.seed * 7) * width * 0.01;
          const y = height * panel.y;
          const w = width * panel.w * (0.75 + flow * 0.35);
          const h = height * panel.h;
          ctx.fillStyle = `rgba(${70 + l.core * 90}, ${150 + l.scan * 70}, 255, ${(0.06 + online * 0.24) * flow})`;
          ctx.fillRect(x, y, w, h);
          ctx.strokeStyle = `rgba(160,236,255,${0.06 + online * 0.26})`;
          ctx.strokeRect(x, y, w, h);
        }
      }

      function drawPhaseTransitions(t, l) {
        const cx = width * 0.5;
        const cy = height * 0.52;
        const unit = Math.min(width, height);
        let beatStrength = 0;
        for (const b of PHASE_BEATS) beatStrength += pulse(t, b - 0.2, b, b + 0.42);
        beatStrength = clamp01(beatStrength);
        if (beatStrength <= 0.01 && l.core < 0.08) return;

        const convergence = pulse(t, 9.05, 9.95, 10.75);
        const beamW = width * (0.05 + convergence * 0.12);
        const beam = ctx.createLinearGradient(cx - beamW, 0, cx + beamW, 0);
        beam.addColorStop(0, "rgba(0,0,0,0)");
        beam.addColorStop(0.5, `rgba(170,230,255,${0.05 + convergence * 0.14 + beatStrength * 0.08})`);
        beam.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = beam;
        ctx.fillRect(cx - beamW, height * 0.12, beamW * 2, height * 0.8);

        const shock = pulse(t, 8.56, 8.86, 9.24) + pulse(t, 10.18, 10.36, 10.9) * 0.8;
        if (shock > 0.01) {
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = `rgba(255,96,104,${0.08 + shock * 0.45})`;
          ctx.lineWidth = 2 + shock * 6;
          ctx.beginPath();
          ctx.arc(cx, cy, unit * (0.11 + shock * 0.2), 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalCompositeOperation = "source-over";
        }

        if (beatStrength > 0.02) {
          ctx.fillStyle = `rgba(210,242,255,${beatStrength * 0.08})`;
          ctx.fillRect(0, 0, width, height);
        }
      }

      function drawCentralSystems(t, l) {
        const cx = width * 0.5;
        const cy = height * 0.52;
        const unit = Math.min(width, height);

        const morph = l.ignite * 0.26 + l.init * 0.58 + l.scan * 0.82 + l.core * 1.18 + l.awake * 1;
        const outer = unit * (0.15 + l.init * 0.05 + l.core * 0.11 + l.awake * 0.07);
        const unfold = smooth(2.2, 6.4, t);
        const fracture = smooth(5.5, 9.6, t);
        const reconf = smooth(8.0, 11.2, t);
        const critical = pulse(t, 8.56, 8.86, 9.24) + pulse(t, 10.18, 10.36, 10.9) * 0.7;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(Math.sin(t * 0.22) * 0.08);

        const shadow = ctx.createRadialGradient(0, 0, 0, 0, 0, outer * (8.8 + l.core * 1.8));
        shadow.addColorStop(0, `rgba(8,13,19,${0.6 + l.core * 0.2})`);
        shadow.addColorStop(0.3, `rgba(6,10,14,${0.52 + morph * 0.16})`);
        shadow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = shadow;
        ctx.beginPath();
        ctx.arc(0, 0, outer * (8.8 + l.core * 1.8), 0, Math.PI * 2);
        ctx.fill();

        // evolving dark mass layers with shifting facets (replaces simple circular reactor feel)
        const layers = 7;
        for (let layer = 0; layer < layers; layer++) {
          const nodesCount = 7 + ((layer * 3) % 5);
          const base = outer * (0.55 + layer * 0.22);
          const spin = t * (0.16 + layer * 0.07) * (layer % 2 ? -1 : 1);
          const fold = (Math.sin(t * (1.1 + layer * 0.24) + layer * 1.3) * 0.5 + 0.5) * (0.12 + unfold * 0.22);
          const split = fracture * ((layer % 3 === 0 ? 1 : 0.62) * (0.2 + Math.sin(t * 0.6 + layer) * 0.08));
          ctx.beginPath();
          for (let i = 0; i <= nodesCount; i++) {
            const a = spin + (i / nodesCount) * Math.PI * 2;
            const jitter = Math.sin(t * (2.1 + layer * 0.18) + i * 1.2 + layer * 2.4) * base * (0.07 + fold);
            const spike = (i % 2 ? 1 : -1) * base * split;
            const stretch = 1 + Math.sin(t * 0.9 + layer * 0.8) * 0.12 + reconf * 0.18;
            const x = Math.cos(a) * (base + jitter + spike) * stretch;
            const y = Math.sin(a) * (base * 0.74 + jitter * 0.6 - spike * 0.45);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.closePath();
          ctx.fillStyle = `rgba(${10 + layer * 5},${14 + layer * 7},${20 + layer * 9},${0.2 + morph * 0.06})`;
          ctx.strokeStyle = `rgba(${56 + layer * 10},${88 + l.scan * 36},${114 + l.core * 56},${0.05 + morph * 0.18})`;
          ctx.lineWidth = Math.max(1, unit * (0.001 + layer * 0.00022));
          ctx.fill();
          ctx.stroke();
        }

        // opening seams, folding rails, and lock traces emitted from the mass
        const tendrilCount = 14;
        for (let i = 0; i < tendrilCount; i++) {
          const a = (i / tendrilCount) * Math.PI * 2 + t * 0.12;
          const startR = outer * (0.9 + (i % 4) * 0.18);
          const extension = outer * (1.3 + unfold * 1.2 + fracture * 1.4 + (i % 3) * 0.24);
          const elbow = outer * (0.95 + Math.sin(t * 1.6 + i * 0.9) * 0.25);
          const sx = Math.cos(a) * startR;
          const sy = Math.sin(a) * startR * 0.82;
          const mx = Math.cos(a + Math.sin(t * 1.2 + i) * 0.28) * elbow;
          const my = Math.sin(a + Math.cos(t * 1.2 + i) * 0.2) * elbow * 0.86;
          const ex = Math.cos(a) * extension;
          const ey = Math.sin(a) * extension * (0.8 + Math.sin(t * 0.8 + i) * 0.12);

          const active = clamp01(morph * 1.08 - i * 0.03);
          if (active < 0.02) continue;
          ctx.strokeStyle = `rgba(${58 + active * 64 + critical * 120},${98 + active * 74 - critical * 38},${126 + active * 92 - critical * 52},${0.05 + active * 0.22})`;
          ctx.lineWidth = Math.max(0.9, unit * (0.0009 + (i % 4) * 0.0002));
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.quadraticCurveTo(mx, my, ex, ey);
          ctx.stroke();

          const packet = (t * (1.4 + (i % 4) * 0.2) + i * 0.1) % 1;
          const px = sx * (1 - packet) + ex * packet + Math.sin(packet * Math.PI) * (mx - (sx + ex) * 0.5);
          const py = sy * (1 - packet) + ey * packet + Math.sin(packet * Math.PI) * (my - (sy + ey) * 0.5);
          ctx.fillStyle = `rgba(120,206,255,${0.04 + active * 0.38})`;
          ctx.beginPath();
          ctx.arc(px, py, 1 + active * 1.6, 0, Math.PI * 2);
          ctx.fill();

          // panel-like emitted shards that align/reconfigure around tips
          if (active > 0.35 && i % 2 === 0) {
            const shardW = unit * (0.018 + (i % 3) * 0.004);
            const shardH = unit * 0.006;
            const rot = a + Math.sin(t * 1.7 + i) * 0.5;
            ctx.save();
            ctx.translate(ex, ey);
            ctx.rotate(rot);
            ctx.fillStyle = `rgba(10,18,28,${0.24 + active * 0.28})`;
            ctx.strokeStyle = `rgba(92,162,214,${0.07 + active * 0.22})`;
            ctx.lineWidth = 1;
            ctx.fillRect(-shardW * 0.5, -shardH * 0.5, shardW, shardH);
            ctx.strokeRect(-shardW * 0.5, -shardH * 0.5, shardW, shardH);
            ctx.restore();
          }
        }

        // orbital activation arcs around emitted structures
        for (let i = 0; i < 6; i++) {
          const sweep = clamp01(unfold + fracture * 0.8 - i * 0.11);
          if (sweep < 0.05) continue;
          const rr = outer * (1.8 + i * 0.34);
          const span = Math.PI * (0.2 + sweep * 0.38);
          const base = t * (0.35 + i * 0.1) * (i % 2 ? -1 : 1);
          ctx.strokeStyle = `rgba(${84 + critical * 110},${146 + sweep * 56 - critical * 46},${196 + sweep * 48},${0.05 + sweep * 0.15})`;
          ctx.lineWidth = Math.max(1, unit * 0.0012);
          for (let seg = 0; seg < 3; seg++) {
            const a0 = base + seg * (Math.PI * 0.66) + Math.sin(t * 0.9 + seg + i) * 0.18;
            ctx.beginPath();
            ctx.arc(0, 0, rr, a0, a0 + span);
            ctx.stroke();
          }
        }

        // node cloud still exists but as controlled activation debris around dark core
        ctx.globalCompositeOperation = "lighter";
        for (const n of nodes) {
          const a = n.a + t * n.speed * (0.18 + l.scan * 0.75 + l.awake * 0.5);
          const rr = outer * (1.05 + n.ring * 1.2 + Math.sin(t * 1.1 + n.seed * 5) * 0.07);
          const nx = Math.cos(a) * rr;
          const ny = Math.sin(a * (1.02 + n.seed * 0.08)) * rr * (0.78 + Math.sin(t * 0.7 + n.seed * 4) * 0.1);
          const online = clamp01(l.init * 0.5 + l.scan + l.core * 1.3 + l.awake * 1.5 - n.seed * 0.42);
          ctx.fillStyle = `rgba(${102 + l.awake * 66}, ${168 + l.scan * 40}, ${228 + l.core * 20}, ${(0.05 + online * 0.32) * (0.16 + n.seed * 0.5)})`;
          ctx.beginPath();
          ctx.arc(nx, ny, 1 + unit * 0.0018 + n.seed * 1.2, 0, Math.PI * 2);
          ctx.fill();

          if (n.seed > 0.72 && l.scan > 0.15) {
            ctx.strokeStyle = `rgba(90,172,226,${0.04 + l.scan * 0.15 + l.awake * 0.1})`;
            ctx.lineWidth = Math.max(0.8, unit * 0.00085);
            ctx.beginPath();
            ctx.moveTo(nx * 0.4, ny * 0.4);
            ctx.lineTo(nx, ny);
            ctx.stroke();
          }
        }
        ctx.globalCompositeOperation = "source-over";

        // scanning arcs and framing geometry pushed outward from the reconfiguring mass
        const frameOpen = smooth(3.3, 7.2, t);
        for (let i = 0; i < 4; i++) {
          const side = i % 2 ? 1 : -1;
          const top = i < 2 ? -1 : 1;
          const drift = Math.sin(t * 0.7 + i) * outer * 0.08;
          const fx = side * outer * (2.55 + frameOpen * 1.25) + drift;
          const fy = top * outer * (1.46 + frameOpen * 0.68) - drift * 0.5;
          const fw = outer * (0.72 + frameOpen * 0.54);
          const fh = outer * 0.11;
          ctx.save();
          ctx.translate(fx, fy);
          ctx.rotate(top * side * 0.22 + Math.sin(t * 1.2 + i) * 0.1);
          ctx.fillStyle = `rgba(8,16,26,${0.2 + frameOpen * 0.16})`;
          ctx.strokeStyle = `rgba(82,154,204,${0.05 + frameOpen * 0.18})`;
          ctx.lineWidth = 1;
          ctx.fillRect(-fw * 0.5, -fh * 0.5, fw, fh);
          ctx.strokeRect(-fw * 0.5, -fh * 0.5, fw, fh);
          ctx.restore();
        }

        // central intelligence node remains dark, with controlled cyan accents only
        const coreR = unit * (0.024 + l.ignite * 0.03 + l.core * 0.05 + l.awake * 0.036);
        const nodeGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, coreR * 7);
        nodeGlow.addColorStop(0, `rgba(30,44,58,${0.68 + l.awake * 0.12})`);
        nodeGlow.addColorStop(0.32, `rgba(${52 + critical * 130},${92 + l.scan * 55 - critical * 26},${128 + l.core * 90 - critical * 46},${0.18 + l.core * 0.24})`);
        nodeGlow.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = nodeGlow;
        ctx.beginPath();
        ctx.arc(0, 0, coreR * 7, 0, Math.PI * 2);
        ctx.fill();

        const facetCount = 12;
        for (let i = 0; i < facetCount; i++) {
          const a = t * 1.1 + (i / facetCount) * Math.PI * 2;
          const f = 0.35 + 0.65 * Math.sin(t * 2.3 + i * 0.9);
          const r0 = coreR * (0.2 + (i % 3) * 0.15);
          const r1 = coreR * (0.8 + f * 1.2 + reconf * 0.8);
          ctx.strokeStyle = `rgba(${70 + critical * 160}, ${122 + l.scan * 40 - critical * 42}, ${158 + l.core * 80 - critical * 62}, ${0.06 + l.core * 0.24})`;
          ctx.lineWidth = Math.max(1, unit * 0.0011);
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * r0, Math.sin(a) * r0);
          ctx.lineTo(Math.cos(a) * r1, Math.sin(a) * r1);
          ctx.stroke();
        }

        ctx.strokeStyle = `rgba(124,198,240,${0.14 + l.core * 0.34})`;
        ctx.lineWidth = Math.max(1.2, unit * 0.0019);
        ctx.beginPath();
        ctx.arc(0, 0, coreR * (2.2 + 0.4 * Math.sin(t * 2.1)), 0, Math.PI * 2);
        ctx.stroke();

        const awakeBeat = 0.5 + 0.5 * Math.sin(t * 2.8 + Math.sin(t * 0.4));
        if (l.awake > 0.1) {
          ctx.strokeStyle = `rgba(${106 + critical * 120},${182 + l.awake * 26 - critical * 45},${236 - critical * 72},${0.08 + l.awake * 0.16 + awakeBeat * 0.08})`;
          ctx.lineWidth = 1 + l.awake * 1.1;
          ctx.beginPath();
          ctx.arc(0, 0, coreR * (4.7 + awakeBeat * 0.5), 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.restore();
      }

      function drawLoadingLayer(t, l) {
        const loadingActive = smooth(2.0, 3.1, t) * (1 - smooth(8.55, 9.85, t));
        if (loadingActive < 0.01) return;

        const cx = width * 0.5;
        const cy = height * 0.19;
        const unit = Math.min(width, height);
        const panelW = Math.min(width * 0.52, 620);
        const panelH = Math.max(70, height * 0.14);
        const x = cx - panelW / 2;
        const y = cy - panelH / 2;

        ctx.save();
        ctx.globalAlpha = loadingActive;
        ctx.fillStyle = `rgba(5,15,38,${0.3 + l.init * 0.22 + l.scan * 0.16})`;
        ctx.fillRect(x, y, panelW, panelH);
        ctx.strokeStyle = `rgba(110,198,255,${0.14 + l.scan * 0.3})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, panelW, panelH);

        // corner reticle hints
        ctx.strokeStyle = `rgba(186,234,255,${0.18 + l.scan * 0.24})`;
        ctx.lineWidth = 1.3;
        const c = 16;
        const corner = (px, py, sx, sy) => {
          ctx.beginPath();
          ctx.moveTo(px, py + sy * c);
          ctx.lineTo(px, py);
          ctx.lineTo(px + sx * c, py);
          ctx.stroke();
        };
        corner(x, y, 1, 1);
        corner(x + panelW, y, -1, 1);
        corner(x, y + panelH, 1, -1);
        corner(x + panelW, y + panelH, -1, -1);

        // LOADING label and subtask
        ctx.fillStyle = `rgba(217,247,255,${0.9})`;
        ctx.font = `${Math.max(16, unit * 0.03)}px Inter, Segoe UI, sans-serif`;
        ctx.textAlign = "center";
        ctx.letterSpacing = "2px";
        ctx.fillText("LOADING", cx, y + panelH * 0.44);

        const taskIndex = Math.floor((t * 1.65) % LOADING_SUBTASKS.length);
        ctx.fillStyle = `rgba(140,208,255,${0.65})`;
        ctx.font = `${Math.max(9, unit * 0.012)}px Inter, Segoe UI, sans-serif`;
        ctx.fillText(LOADING_SUBTASKS[taskIndex], cx, y + panelH * 0.74);

        // segmented arcs and rotating ticks
        ctx.translate(cx, y + panelH * 0.42);
        for (let j = 0; j < 2; j++) {
          const rr = unit * (0.062 + j * 0.016);
          const spin = t * (j ? -0.9 : 1.2);
          for (let i = 0; i < 12; i++) {
            const a0 = spin + (i / 12) * Math.PI * 2;
            const a1 = a0 + Math.PI * 0.09;
            ctx.strokeStyle = `rgba(126,214,255,${0.08 + ((i + j) % 3 === 0 ? 0.23 : 0.12)})`;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(0, 0, rr, a0, a1);
            ctx.stroke();
          }
        }

        for (let i = 0; i < 18; i++) {
          const a = t * 1.7 + (i / 18) * Math.PI * 2;
          const r0 = unit * 0.034;
          const r1 = unit * 0.042 + (i % 3 === 0 ? unit * 0.007 : 0);
          ctx.strokeStyle = `rgba(202,244,255,${0.1 + (i % 4 === 0 ? 0.26 : 0.12)})`;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * r0, Math.sin(a) * r0);
          ctx.lineTo(Math.cos(a) * r1, Math.sin(a) * r1);
          ctx.stroke();
        }

        // orbiting markers, pulse dots, and scan dashes
        for (let i = 0; i < 6; i++) {
          const a = -t * 1.45 + (i / 6) * Math.PI * 2;
          const rr = unit * 0.054 + Math.sin(t * 1.8 + i) * unit * 0.004;
          const xDot = Math.cos(a) * rr;
          const yDot = Math.sin(a) * rr;
          ctx.fillStyle = `rgba(168,236,255,${0.24 + 0.35 * (0.5 + 0.5 * Math.sin(t * 3 + i))})`;
          ctx.beginPath();
          ctx.arc(xDot, yDot, 1.8, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();

        // rails, calibration bars, waveform fragment and dashes
        const progress = clamp01((t - 2.25) / 6.2);
        const railY = y + panelH - 12;
        ctx.strokeStyle = `rgba(90,182,255,${0.26})`;
        ctx.strokeRect(x + 14, railY, panelW - 28, 6);
        ctx.fillStyle = `rgba(148,224,255,${0.45})`;
        ctx.fillRect(x + 15, railY + 1, (panelW - 30) * progress, 4);

        for (let i = 0; i < 10; i++) {
          const barH = 4 + Math.sin(t * 4 + i * 0.7) * 3 + l.scan * 8;
          const bx = x + 18 + i * 8;
          ctx.fillStyle = `rgba(122,208,255,${0.14 + i * 0.015})`;
          ctx.fillRect(bx, y + 12 + (10 - barH), 2, barH);
        }

        ctx.strokeStyle = `rgba(120,202,255,${0.3})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i <= 46; i++) {
          const k = i / 46;
          const wx = x + panelW - 170 + k * 150;
          const wy = y + 19 + Math.sin(k * 20 + t * 4.1) * 3 + Math.sin(k * 48 - t * 2.6) * 1.2;
          if (i === 0) ctx.moveTo(wx, wy);
          else ctx.lineTo(wx, wy);
        }
        ctx.stroke();

        for (let i = 0; i < 9; i++) {
          const dx = x + 36 + i * (panelW - 72) / 8 + Math.sin(t * 2.2 + i) * 4;
          const dy = y + panelH * 0.57;
          ctx.fillStyle = `rgba(162,228,255,${0.12 + 0.22 * (0.5 + 0.5 * Math.sin(t * 6 + i))})`;
          ctx.fillRect(dx, dy, 10, 1.6);
        }
      }

      function drawDiagnostics(t, l) {
        const active = l.init + l.scan + l.core + l.awake;
        if (active < 0.02) return;

        // progress rails and moving bars
        for (let i = 0; i < 2; i++) {
          const y = height * (0.2 + i * 0.06);
          const x = width * 0.1;
          const w = width * 0.28;
          const p = clamp01((t - (2.8 + i * 0.45)) / (2.6 + i * 0.8));
          ctx.strokeStyle = `rgba(92,182,255,${0.12 + active * 0.24})`;
          ctx.lineWidth = 1;
          ctx.strokeRect(x, y, w, 8);
          ctx.fillStyle = `rgba(${90 + l.core * 100}, ${200 + l.scan * 45}, 255, ${0.18 + active * 0.42})`;
          ctx.fillRect(x + 1, y + 1, (w - 2) * p, 6);
        }

        // waveform strips
        for (let i = 0; i < 3; i++) {
          const y = height * (0.68 + i * 0.04);
          const x0 = width * 0.1;
          const w = width * 0.34;
          ctx.strokeStyle = `rgba(95,198,255,${0.12 + l.scan * 0.3 + l.awake * 0.2})`;
          ctx.beginPath();
          for (let x = 0; x <= w; x += 6) {
            const k = x / w;
            const yy = y + Math.sin(k * 18 + t * (3 + i) + i) * (4 + l.scan * 4) + Math.sin(k * 42 - t * 2.4) * 1.5;
            if (x === 0) ctx.moveTo(x0 + x, yy);
            else ctx.lineTo(x0 + x, yy);
          }
          ctx.stroke();
        }

        // scanning windows
        const sweep = clamp01(l.ignite * 0.6 + l.init + l.scan * 1.2 + l.awake * 0.6);
        const sw = width * 0.8;
        const sx = width * 0.1;
        const sy = height * (0.25 + ((t * 0.26) % 0.46));
        const lg = ctx.createLinearGradient(sx, sy, sx + sw, sy);
        lg.addColorStop(0, "rgba(0,0,0,0)");
        lg.addColorStop(0.18, `rgba(120,210,255,${0.06 + sweep * 0.12})`);
        lg.addColorStop(0.5, `rgba(232,250,255,${0.11 + sweep * 0.25})`);
        lg.addColorStop(0.82, `rgba(120,210,255,${0.06 + sweep * 0.12})`);
        lg.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = lg;
        ctx.fillRect(sx, sy - 2, sw, 4 + l.scan * 2);

        // right-side subsystem online stack
        for (let i = 0; i < 6; i++) {
          const online = clamp01((t - (5.2 + i * 0.48)) / 1.05);
          const x = width * 0.74;
          const y = height * (0.22 + i * 0.062);
          const w = width * 0.16;
          ctx.strokeStyle = `rgba(105,194,255,${0.09 + online * 0.28})`;
          ctx.strokeRect(x, y, w, 10);
          ctx.fillStyle = `rgba(${110 + l.awake * 80}, ${190 + l.scan * 30}, 255, ${0.06 + online * 0.3})`;
          ctx.fillRect(x + 1, y + 1, (w - 2) * online, 8);
          if (online > 0.98) {
            ctx.fillStyle = `rgba(170,248,255,${0.34 + l.awake * 0.2})`;
            ctx.fillRect(x + w + 8, y + 2, 6, 6);
          }
        }
      }

      function drawFrame(t, l) {
        const p = l.init + l.scan + l.core + l.awake;
        if (p < 0.02) return;

        const shrink = l.awake * 0.05;
        const w = width * (0.82 - shrink);
        const h = height * (0.68 - shrink);
        const x = (width - w) / 2;
        const y = height * 0.52 - h / 2;
        ctx.strokeStyle = `rgba(88,182,255,${0.1 + p * 0.16})`;
        ctx.lineWidth = 1.4;
        ctx.strokeRect(x, y, w, h);

        const c = 22 + l.core * 26 + l.awake * 18;
        ctx.strokeStyle = `rgba(${96 + l.core * 120},${176 - l.core * 50},255,${0.2 + p * 0.3})`;
        ctx.lineWidth = 2;
        const drawCorner = (px, py, sx, sy) => {
          ctx.beginPath();
          ctx.moveTo(px, py + sy * c);
          ctx.lineTo(px, py);
          ctx.lineTo(px + sx * c, py);
          ctx.stroke();
        };
        drawCorner(x, y, 1, 1);
        drawCorner(x + w, y, -1, 1);
        drawCorner(x, y + h, 1, -1);
        drawCorner(x + w, y + h, -1, -1);

        const reticle = pulse(t, 9.6, 10.36, 11.7);
        if (reticle > 0.01) {
          const cx = width * 0.5;
          const cy = height * 0.52;
          const rr = Math.min(width, height) * (0.1 + reticle * 0.27);
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = `rgba(255,78,92,${0.12 + reticle * 0.48})`;
          ctx.lineWidth = 1.7 + reticle * 3;
          ctx.beginPath();
          ctx.arc(cx, cy, rr, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalCompositeOperation = "source-over";
        }
      }

      function drawVignette(l) {
        const g = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.2, width * 0.5, height * 0.5, width * 0.84);
        g.addColorStop(0, "rgba(0,0,0,0)");
        g.addColorStop(1, `rgba(0,0,0,${0.56 + l.core * 0.2 + l.awake * 0.22})`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);
      }

      function updateStatus(t, l) {
        const idx = Math.min(LABELS.length - 1, Math.floor((t / DURATION) * LABELS.length));
        const [label, alert] = LABELS[idx];
        statusEl.textContent = label;
        statusEl.classList.toggle("alert", !!alert || pulse(t, 7.6, 8.7, 9.7) > 0.45);
        const show = clamp01(l.ignite * 0.72 + l.init + l.scan + l.core + l.awake);
        statusEl.style.opacity = String(0.04 + show * 0.94);
      }

      function render(now) {
        const t = (now - startTime) / 1000;
        if (t > DURATION) {
          running = false;
          cancelAnimationFrame(raf);
          startBtn.classList.remove("hidden");
          return;
        }

        const l = stageLevels(t);
        ctx.clearRect(0, 0, width, height);
        drawBackground(t, l);
        drawDormantField(t, l);
        drawOperationalGrid(t, l);
        drawShuttersAndPanels(t, l);
        drawCentralSystems(t, l);
        drawLoadingLayer(t, l);
        drawDiagnostics(t, l);
        drawFrame(t, l);
        drawPhaseTransitions(t, l);
        drawVignette(l);
        updateStatus(t, l);

        raf = requestAnimationFrame(render);
      }

      function runAudio() {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;

        const audio = new AC();
        const master = audio.createGain();
        master.gain.value = 0.26;
        master.connect(audio.destination);

        const now = audio.currentTime;
        const end = now + DURATION + 0.24;

        const hum = audio.createOscillator();
        hum.type = "sine";
        hum.frequency.setValueAtTime(29, now);
        hum.frequency.linearRampToValueAtTime(40, now + 3.2);
        hum.frequency.linearRampToValueAtTime(56, now + 8.1);
        hum.frequency.linearRampToValueAtTime(67, now + 11.5);
        const humG = audio.createGain();
        humG.gain.setValueAtTime(0.0001, now);
        humG.gain.exponentialRampToValueAtTime(0.44, now + 1.55);
        humG.gain.linearRampToValueAtTime(0.3, end);
        hum.connect(humG).connect(master);

        const sub = audio.createOscillator();
        sub.type = "sine";
        sub.frequency.setValueAtTime(24, now);
        sub.frequency.linearRampToValueAtTime(31, now + 8.8);
        sub.frequency.linearRampToValueAtTime(34, now + 11.2);
        const subG = audio.createGain();
        subG.gain.setValueAtTime(0.0001, now);
        subG.gain.exponentialRampToValueAtTime(0.4, now + 2.4);
        subG.gain.linearRampToValueAtTime(0.33, end);
        sub.connect(subG).connect(master);

        const bus = audio.createOscillator();
        bus.type = "triangle";
        bus.frequency.setValueAtTime(78, now + 0.25);
        bus.frequency.exponentialRampToValueAtTime(196, now + 6.1);
        bus.frequency.exponentialRampToValueAtTime(282, now + 9.8);
        const busG = audio.createGain();
        busG.gain.setValueAtTime(0.0001, now + 0.15);
        busG.gain.exponentialRampToValueAtTime(0.17, now + 3.6);
        busG.gain.linearRampToValueAtTime(0.14, end);
        bus.connect(busG).connect(master);

        const tickBuffer = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.045), audio.sampleRate);
        const td = tickBuffer.getChannelData(0);
        for (let i = 0; i < td.length; i++) td[i] = (Math.random() * 2 - 1) * Math.exp(-i / 160);

        function tick(time, vol = 0.06, hz = 1200, q = 6) {
          const src = audio.createBufferSource();
          src.buffer = tickBuffer;
          const bp = audio.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = hz;
          bp.Q.value = q;
          const g = audio.createGain();
          g.gain.setValueAtTime(vol, time);
          g.gain.exponentialRampToValueAtTime(0.0001, time + 0.08);
          src.connect(bp).connect(g).connect(master);
          src.start(time);
        }

        tick(now + 1.35, 0.1, 950);
        for (let i = 0; i < 38; i++) {
          const tt = now + 3.7 + i * 0.18 + Math.random() * 0.04;
          tick(tt, 0.02 + (i / 38) * 0.03, 860 + (i % 6) * 160, 7);
        }

        for (const beat of PHASE_BEATS) {
          tick(now + beat, 0.095, 660, 4.2);
        }

        for (let i = 0; i < 16; i++) {
          const tLoad = now + 2.2 + i * 0.31;
          tick(tLoad, 0.024 + (i % 4) * 0.006, 1220 + (i % 5) * 115, 9);
        }

        const growl = audio.createOscillator();
        growl.type = "sawtooth";
        growl.frequency.setValueAtTime(196, now + 7.1);
        growl.frequency.exponentialRampToValueAtTime(72, now + 9.9);
        const growlG = audio.createGain();
        growlG.gain.setValueAtTime(0.0001, now + 7.0);
        growlG.gain.exponentialRampToValueAtTime(0.24, now + 7.8);
        growlG.gain.exponentialRampToValueAtTime(0.0001, now + 10.2);
        growl.connect(growlG).connect(master);

        const impact = audio.createOscillator();
        impact.type = "triangle";
        impact.frequency.setValueAtTime(150, now + 8.82);
        impact.frequency.exponentialRampToValueAtTime(49, now + 9.38);
        const impactG = audio.createGain();
        impactG.gain.setValueAtTime(0.0001, now + 8.78);
        impactG.gain.exponentialRampToValueAtTime(0.52, now + 8.9);
        impactG.gain.exponentialRampToValueAtTime(0.0001, now + 9.6);
        impact.connect(impactG).connect(master);

        const chime = audio.createOscillator();
        chime.type = "square";
        chime.frequency.setValueAtTime(432, now + 10.15);
        chime.frequency.exponentialRampToValueAtTime(118, now + 11.25);
        const chimeG = audio.createGain();
        chimeG.gain.setValueAtTime(0.0001, now + 10.1);
        chimeG.gain.exponentialRampToValueAtTime(0.36, now + 10.34);
        chimeG.gain.exponentialRampToValueAtTime(0.0001, now + 11.45);
        chime.connect(chimeG).connect(master);

        const authority = audio.createOscillator();
        authority.type = "sawtooth";
        authority.frequency.setValueAtTime(96, now + 10.32);
        authority.frequency.linearRampToValueAtTime(82, now + 11.8);
        const authFilter = audio.createBiquadFilter();
        authFilter.type = "lowpass";
        authFilter.frequency.setValueAtTime(820, now + 10.32);
        authFilter.frequency.linearRampToValueAtTime(560, now + 11.8);
        const authorityG = audio.createGain();
        authorityG.gain.setValueAtTime(0.0001, now + 10.3);
        authorityG.gain.exponentialRampToValueAtTime(0.19, now + 10.7);
        authorityG.gain.linearRampToValueAtTime(0.12, end);
        authority.connect(authFilter).connect(authorityG).connect(master);

        const tailNoise = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.7), audio.sampleRate);
        const tailData = tailNoise.getChannelData(0);
        for (let i = 0; i < tailData.length; i++) {
          tailData[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audio.sampleRate * 0.1));
        }
        const tailSrc = audio.createBufferSource();
        tailSrc.buffer = tailNoise;
        const lp = audio.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = 2200;
        const tailG = audio.createGain();
        tailG.gain.setValueAtTime(0.0001, now + 10.24);
        tailG.gain.exponentialRampToValueAtTime(0.11, now + 10.44);
        tailG.gain.exponentialRampToValueAtTime(0.0001, now + 11.4);
        tailSrc.connect(lp).connect(tailG).connect(master);

        hum.start(now);
        sub.start(now);
        bus.start(now + 0.2);
        growl.start(now + 7.0);
        impact.start(now + 8.78);
        chime.start(now + 10.1);
        authority.start(now + 10.3);
        tailSrc.start(now + 10.24);

        hum.stop(end);
        sub.stop(end);
        bus.stop(end);
        growl.stop(now + 10.2);
        impact.stop(now + 9.64);
        chime.stop(now + 11.5);
        authority.stop(end);
      }

      function begin() {
        if (running) return;
        running = true;
        startBtn.classList.add("hidden");
        startTime = performance.now();
        runAudio();
        raf = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      startBtn.addEventListener("click", begin);
      resize();
      drawBackground(0, stageLevels(0));
      statusEl.textContent = "DORMANT FIELD";
      statusEl.style.opacity = "0.32";
    </script>
  </body>
</html>
