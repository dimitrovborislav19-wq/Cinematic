<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Machine Flythrough</title>
    <style>
      :root {
        --bg0: #010106;
        --bg1: #04071a;
        --fg: #dff7ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 50% 82%, var(--bg1) 0%, var(--bg0) 52%, #000 100%);
        color: var(--fg);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(140%) contrast(116%);
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: end center;
        pointer-events: none;
        padding: 2rem;
      }

      #status {
        opacity: 0;
        letter-spacing: 0.38rem;
        font-size: clamp(0.72rem, 1.6vw, 1.2rem);
        text-transform: uppercase;
        text-shadow: 0 0 24px rgba(123, 241, 255, 0.7);
        transition: opacity 480ms ease;
      }

      #status.show {
        opacity: 1;
      }

      #startBtn {
        position: fixed;
        top: 1.05rem;
        right: 1.05rem;
        pointer-events: auto;
        border: 1px solid rgba(132, 240, 255, 0.28);
        color: rgba(225, 249, 255, 0.86);
        background: rgba(1, 5, 14, 0.45);
        border-radius: 999px;
        padding: 0.66rem 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.68rem;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(46, 111, 255, 0.1);
        backdrop-filter: blur(6px);
      }

      #startBtn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="overlay">
      <div id="status" aria-live="polite"></div>
      <button id="startBtn">Awaken</button>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");

      const DURATION = 11.6;
      const STAR_COUNT = 1500;
      const MONOLITH_COUNT = 220;
      const SHARD_COUNT = 360;
      const PORTAL_COUNT = 90;
      const STREAM_COUNT = 180;
      const BIO_COUNT = 110;

      let width = 0;
      let height = 0;
      let raf = null;
      let startTime = 0;
      let running = false;

      const stars = Array.from({ length: STAR_COUNT }, () => ({
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        z: Math.random(),
        tw: Math.random() * Math.PI * 2,
        seed: Math.random(),
      }));

      const monoliths = Array.from({ length: MONOLITH_COUNT }, () => ({
        x: (Math.random() * 2 - 1) * 1.45,
        y: (Math.random() * 2 - 1) * 1.18,
        z: Math.random(),
        w: Math.random() * 0.028 + 0.01,
        h: Math.random() * 0.11 + 0.05,
        lane: Math.random() > 0.5 ? 1 : -1,
        twist: Math.random() * Math.PI * 2,
        pitch: (Math.random() * 2 - 1) * 1.1,
        flux: Math.random() * 0.8 + 0.3,
        seed: Math.random(),
      }));

      const shards = Array.from({ length: SHARD_COUNT }, () => ({
        x: (Math.random() * 2 - 1) * 1.65,
        y: (Math.random() * 2 - 1) * 1.3,
        z: Math.random(),
        r: Math.random() * 0.012 + 0.004,
        a: Math.random() * Math.PI * 2,
        seed: Math.random(),
      }));

      const portals = Array.from({ length: PORTAL_COUNT }, () => ({
        z: Math.random(),
        radius: Math.random() * 0.42 + 0.22,
        tilt: (Math.random() * 2 - 1) * 0.8,
        spin: (Math.random() * 2 - 1) * 1.2,
        fold: Math.random() * Math.PI * 2,
        ribs: 5 + Math.floor(Math.random() * 4),
        seed: Math.random(),
      }));

      const streams = Array.from({ length: STREAM_COUNT }, () => ({
        x: (Math.random() * 2 - 1) * 1.45,
        y: (Math.random() * 2 - 1) * 1.1,
        z: Math.random(),
        p: Math.random() * Math.PI * 2,
        bend: (Math.random() * 2 - 1) * 0.8,
        seed: Math.random(),
      }));

      const biosystems = Array.from({ length: BIO_COUNT }, () => ({
        x: (Math.random() * 2 - 1) * 1.32,
        y: (Math.random() * 2 - 1) * 1.0,
        z: Math.random(),
        phase: Math.random() * Math.PI * 2,
        arc: Math.random() * 0.42 + 0.2,
        lean: (Math.random() * 2 - 1) * 0.6,
        pulse: Math.random() * 0.8 + 0.4,
        seed: Math.random(),
      }));

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      const phase01 = (t) => clamp01(t / DURATION);
      function smoothstep(a, b, x) {
        const t = clamp01((x - a) / (b - a));
        return t * t * (3 - 2 * t);
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.width = Math.floor(window.innerWidth * dpr);
        height = canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      function project(x, y, z, t, camX, camY, curvature = 0.06) {
        const zz = Math.max(0.018, z);
        const depth = 2.35 / zz;
        const bendX = curvature * Math.sin(t * 0.56 + zz * 9.5 + y * 1.2);
        const bendY = curvature * Math.cos(t * 0.49 + zz * 10.7 + x * 1.4);
        return {
          x: width * (0.5 + (x + bendX + camX * zz) * depth * 0.255),
          y: height * (0.5 + (y + bendY + camY * zz) * depth * 0.255),
          depth,
          z: zz,
        };
      }

      function advanceZ(p, speed, dt = 0.016, reset = 1) {
        p.z -= speed * dt;
        if (p.z < 0.015) p.z += reset;
      }

      function getPhaseWeights(t) {
        const p1 = 1 - smoothstep(3.4, 5.1, t);
        const p2 = smoothstep(2.7, 5.2, t) * (1 - smoothstep(7.5, 9.4, t));
        const p3 = smoothstep(7.1, 9.3, t);
        return { p1, p2, p3 };
      }

      function drawBackground(t) {
        const { p1, p2, p3 } = getPhaseWeights(t);
        const awaken = smoothstep(0.05, 1.25, t);
        const sink = smoothstep(8.3, 11.4, t);

        const g = ctx.createRadialGradient(
          width * (0.5 + Math.sin(t * 0.1) * 0.03),
          height * (0.58 - sink * 0.08),
          width * (0.01 + awaken * 0.03),
          width * 0.5,
          height * 0.55,
          width * 1.0
        );
        g.addColorStop(0, `hsla(${214 + p2 * 16 + p3 * 22}, 100%, ${3 + awaken * 14 + p3 * 16}%, 0.99)`);
        g.addColorStop(0.5, `hsla(${230 + p2 * 10}, 75%, ${3 + p2 * 7}%, 0.94)`);
        g.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        const haze = ctx.createLinearGradient(0, 0, width, height);
        haze.addColorStop(0, `rgba(16, 32, 62, ${0.05 + p2 * 0.1})`);
        haze.addColorStop(1, `rgba(0, 0, 0, ${0.34 + p3 * 0.22 + p1 * 0.08})`);
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, width, height);
      }

      function drawStars(t, camX, camY, speed) {
        const { p1, p2, p3 } = getPhaseWeights(t);
        const awaken = smoothstep(0, 1.8, t);
        for (const s of stars) {
          advanceZ(s, speed * (0.55 + s.seed * 0.9), 0.016);
          const q = project(s.x, s.y, s.z, t, camX, camY, 0.04 + p3 * 0.02);
          if (q.x < -24 || q.x > width + 24 || q.y < -24 || q.y > height + 24) continue;

          const tw = 0.5 + 0.5 * Math.sin(t * (2 + s.seed * 6) + s.tw + s.z * 10);
          const phaseLen = 1 + p2 * q.depth * 0.38 + p3 * q.depth * 0.65;
          const alpha = (0.03 + awaken * 0.22 + p2 * 0.22 + p3 * 0.3) * (0.35 + tw * 0.85);
          ctx.strokeStyle = `hsla(${196 + p3 * 22}, 100%, ${70 + tw * 20}%, ${alpha})`;
          ctx.lineWidth = Math.max(1, q.depth * 0.36);
          ctx.beginPath();
          ctx.moveTo(q.x, q.y);
          ctx.lineTo(q.x - phaseLen * speed * 1.1, q.y + phaseLen * 0.35);
          ctx.stroke();
        }
      }

      function drawMonoliths(t, camX, camY, speed) {
        const { p1, p2, p3 } = getPhaseWeights(t);
        const density = 0.2 + p1 * 0.7 + p2 * 1.2 + p3 * 0.9;
        ctx.globalCompositeOperation = "lighter";

        for (const m of monoliths) {
          advanceZ(m, speed * (1 + m.seed * 1.5), 0.016);
          const sway = Math.sin(t * (1.1 + m.flux * 0.4) + m.seed * 8 + m.z * 9) * (0.1 + p2 * 0.24);
          const x = m.x + m.lane * sway;
          const y = m.y + Math.cos(t * 0.8 + m.seed * 12) * (0.04 + p3 * 0.09);
          const depthLift = Math.min(1, m.z + 0.13);
          const flex = Math.sin(t * 1.2 + m.twist + m.z * 16) * (0.05 + p3 * 0.12);
          const shear = Math.cos(t * 0.9 + m.pitch + m.z * 12) * (0.06 + p2 * 0.08);

          const a = project(x - m.w, y - m.h, m.z, t, camX * 1.5, camY * 1.25, 0.03);
          const b = project(x + m.w + flex, y - m.h + shear, m.z, t, camX * 1.5, camY * 1.25, 0.03);
          const c = project(x + m.w - flex, y + m.h, depthLift, t, camX * 1.5, camY * 1.25, 0.03);
          const d = project(x - m.w - flex * 0.6, y + m.h - shear, depthLift, t, camX * 1.5, camY * 1.25, 0.03);
          const core = project(x + flex * 0.3, y, Math.min(1, m.z + 0.06), t, camX * 1.5, camY * 1.25, 0.03);

          const alpha = (0.02 + density * 0.11) * (1.12 - m.z);
          const hue = 188 + p2 * 18 + p3 * 32 + Math.sin(m.seed * 11 + t * 0.6) * 10;
          const g = ctx.createLinearGradient(a.x, a.y, c.x, c.y);
          g.addColorStop(0, `hsla(${hue - 18}, 100%, ${38 + p2 * 8}%, ${alpha * 0.7})`);
          g.addColorStop(0.52, `hsla(${hue + 4}, 100%, ${58 + p2 * 16 + p3 * 14}%, ${alpha})`);
          g.addColorStop(1, `hsla(${hue + 26}, 100%, ${50 + p3 * 18}%, ${alpha * 0.72})`);
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.lineTo(c.x, c.y);
          ctx.lineTo(d.x, d.y);
          ctx.closePath();
          ctx.fill();

          ctx.strokeStyle = `hsla(${hue + 34}, 100%, 84%, ${alpha * (0.36 + p2 * 0.4 + p3 * 0.42)})`;
          ctx.lineWidth = Math.max(1, a.depth * 0.52);
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.quadraticCurveTo(core.x, core.y, c.x, c.y);
          ctx.stroke();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawShards(t, camX, camY, speed) {
        const { p1, p2, p3 } = getPhaseWeights(t);
        ctx.globalCompositeOperation = "lighter";
        for (const s of shards) {
          advanceZ(s, speed * (0.8 + s.seed * 1.4 + p3 * 0.8), 0.016);
          s.a += 0.02 + s.seed * 0.01;
          const drift = p2 * 0.15 + p3 * 0.35;
          s.x += Math.sin(s.a + t * 0.9) * 0.0009 * drift;
          s.y += Math.cos(s.a * 1.2 + t * 0.7) * 0.0007 * drift;

          const p = project(s.x, s.y, s.z, t, camX * 1.2, camY * 1.2, 0.05 + p3 * 0.03);
          if (p.x < -32 || p.x > width + 32 || p.y < -32 || p.y > height + 32) continue;

          const rr = s.r * p.depth * width * (0.007 + p2 * 0.006 + p3 * 0.01);
          const pulse = 0.5 + 0.5 * Math.sin(t * 4 + s.seed * 14 + s.z * 20);
          const alpha = (0.02 + p2 * 0.2 + p3 * 0.26) * (1.1 - s.z) * (0.5 + pulse * 0.8);
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr * 3.6);
          g.addColorStop(0, `hsla(${194 + p3 * 34}, 100%, 84%, ${alpha})`);
          g.addColorStop(0.4, `hsla(${210 + p2 * 18 + p3 * 24}, 100%, 66%, ${alpha * 0.65})`);
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, rr * 3.6, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawPortals(t, camX, camY, speed) {
        const { p2, p3 } = getPhaseWeights(t);
        const active = p2 + p3;
        if (active <= 0.02) return;

        ctx.globalCompositeOperation = "lighter";
        for (const r of portals) {
          advanceZ(r, speed * (1.3 + r.seed + p3 * 0.8), 0.016);
          const p = project(0, 0, r.z, t, camX * 0.86, camY * 0.86, 0.02);
          const radius = (r.radius + Math.sin(t * 0.9 + r.seed * 9 + r.fold) * 0.03) * p.depth * width * 0.052;
          const alpha = (0.02 + active * 0.28) * (1.08 - r.z);
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(r.spin * t * 0.24 + r.tilt + Math.sin(t * 0.35 + r.fold) * 0.4);
          ctx.scale(1, 0.32 + p3 * 0.28 + Math.sin(t * 0.6 + r.seed * 5) * 0.1);

          for (let k = 0; k < r.ribs; k++) {
            const a0 = (Math.PI * 2 * k) / r.ribs + t * (0.18 + r.seed * 0.22);
            const wave = Math.sin(t * 1.5 + r.fold + k) * (0.18 + p3 * 0.24);
            const rr = radius * (0.72 + Math.sin(a0 * 2.2 + wave) * 0.26 + p3 * 0.1);
            const px = Math.cos(a0) * rr;
            const py = Math.sin(a0) * rr;
            const qx = Math.cos(a0 + Math.PI * 0.62) * rr * (0.5 + wave * 0.3);
            const qy = Math.sin(a0 + Math.PI * 0.62) * rr * (0.5 - wave * 0.3);

            ctx.strokeStyle = `hsla(${196 + p3 * 38 + k * 4}, 100%, ${56 + p3 * 24}%, ${alpha * 0.85})`;
            ctx.lineWidth = Math.max(1, p.depth * (0.26 + k * 0.05));
            ctx.beginPath();
            ctx.moveTo(px, py);
            ctx.quadraticCurveTo(qx, qy, -px * (0.6 + wave), -py * (0.6 - wave));
            ctx.stroke();
          }

          ctx.strokeStyle = `hsla(${206 + p3 * 30}, 100%, ${64 + p3 * 20}%, ${alpha * 0.72})`;
          ctx.lineWidth = Math.max(1, p.depth * 0.4);
          ctx.setLineDash([10 + r.seed * 18, 14 + (1 - r.seed) * 24]);
          ctx.beginPath();
          ctx.ellipse(0, 0, radius, radius * (0.8 + Math.sin(t + r.fold) * 0.16), 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        ctx.setLineDash([]);
        ctx.globalCompositeOperation = "source-over";
      }

      function drawStreams(t, camX, camY, speed) {
        const { p2, p3 } = getPhaseWeights(t);
        if (p2 + p3 < 0.08) return;
        ctx.globalCompositeOperation = "lighter";
        for (const s of streams) {
          advanceZ(s, speed * (1.1 + s.seed * 1.6 + p3 * 0.8), 0.016);
          const wobble = Math.sin(t * 1.4 + s.p + s.z * 6) * (0.18 + p3 * 0.28);
          const p = project(s.x + wobble, s.y, s.z, t, camX * 1.5, camY * 1.4, 0.06);
          const len = (8 + p.depth * 1.8) * (0.4 + p3 * 0.9);
          const a = (0.04 + p2 * 0.11 + p3 * 0.16) * (1.05 - s.z);
          const curl = Math.sin(t * 2.1 + s.seed * 9 + s.bend * 6) * (5 + p3 * 14);
          ctx.strokeStyle = `hsla(${178 + p3 * 46}, 100%, 78%, ${a})`;
          ctx.lineWidth = Math.max(1, p.depth * 0.32);
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.bezierCurveTo(
            p.x + len * (0.16 + s.bend * 0.2),
            p.y - len * 1.4 + curl,
            p.x - len * (0.2 + s.bend * 0.16),
            p.y - len * 2.1 - curl,
            p.x + len * (0.56 + s.bend * 0.26),
            p.y - len * 2.7
          );
          ctx.stroke();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawConsciousness(t) {
        const born = smoothstep(0.02, 1.1, t);
        const fadeSelf = 1 - smoothstep(3.6, 5.4, t);
        const survive = smoothstep(8.2, 10.6, t) * 0.7;
        const life = born * (fadeSelf + survive);
        if (life <= 0.01) return;

        const cx = width * 0.5 + Math.sin(t * 0.8) * width * 0.012;
        const cy = height * 0.54 + Math.cos(t * 0.6) * height * 0.01;
        const r = width * (0.0028 + life * 0.0036);
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 16);
        g.addColorStop(0, `rgba(224,252,255,${0.82 * life})`);
        g.addColorStop(0.4, `rgba(132,232,255,${0.52 * life})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = `rgba(235,255,255,${0.9 * life})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
      }

      function drawImpossibleBiology(t, camX, camY, speed) {
        const { p2, p3 } = getPhaseWeights(t);
        const emergence = smoothstep(4.4, 7.2, t) * (1 - smoothstep(10.4, 11.5, t));
        if (emergence <= 0.01) return;

        ctx.globalCompositeOperation = "lighter";
        for (const b of biosystems) {
          advanceZ(b, speed * (0.72 + b.seed * 1.15), 0.016);
          const p = project(b.x, b.y, b.z, t, camX * 1.1, camY * 1.1, 0.05 + p3 * 0.03);
          if (p.x < -40 || p.x > width + 40 || p.y < -40 || p.y > height + 40) continue;

          const major = width * (0.006 + p.depth * 0.0018) * (1 + emergence * 0.9);
          const micro = 0.3 + 0.7 * Math.sin(t * (2.2 + b.pulse) + b.phase + b.z * 12);
          const rot = t * (0.3 + b.seed * 0.8) + b.phase;
          const alpha = (0.03 + emergence * 0.16 + p2 * 0.1 + p3 * 0.08) * (1.05 - b.z);

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(rot);
          ctx.scale(1, 0.55 + Math.sin(t * 0.8 + b.lean * 8) * 0.24);

          ctx.strokeStyle = `hsla(${182 + p3 * 30 + micro * 24}, 100%, ${62 + micro * 20}%, ${alpha})`;
          ctx.lineWidth = Math.max(1, p.depth * 0.3);
          ctx.beginPath();
          ctx.moveTo(-major * (1.25 + b.arc), 0);
          ctx.bezierCurveTo(-major * 0.5, -major * (1.1 + b.lean), major * 0.42, major * (1.4 - b.lean), major * (1.1 + b.arc), 0);
          ctx.stroke();

          ctx.strokeStyle = `hsla(${210 + p3 * 22}, 100%, ${68 + micro * 16}%, ${alpha * 0.82})`;
          ctx.beginPath();
          ctx.moveTo(-major * (0.95 + b.arc), -major * 0.06);
          ctx.bezierCurveTo(-major * 0.3, major * (0.8 + b.lean), major * 0.32, -major * (0.95 - b.lean), major * (0.92 + b.arc), major * 0.05);
          ctx.stroke();

          if (micro > 0.78) {
            ctx.fillStyle = `rgba(225, 255, 255, ${alpha * 0.85})`;
            ctx.beginPath();
            ctx.arc(major * (0.22 + b.lean * 0.35), -major * 0.1, major * 0.1, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawUncannyMoment(t) {
        const eventA = smoothstep(5.65, 6.2, t) * (1 - smoothstep(6.2, 6.75, t));
        const eventB = smoothstep(9.55, 9.98, t) * (1 - smoothstep(10.02, 10.52, t));
        const energy = Math.max(eventA, eventB);
        if (energy <= 0.001) return;

        const cx = width * (0.5 + Math.sin(t * 0.4) * 0.015);
        const cy = height * (0.5 + Math.cos(t * 0.34) * 0.012);
        const ring = width * (0.09 + eventA * 0.06 + eventB * 0.03);

        ctx.globalCompositeOperation = "lighter";
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(t * 0.25 + eventB * 0.8 + eventA * 0.18);

        for (let i = 0; i < 4; i++) {
          const phase = t * (1.1 + i * 0.37);
          const squash = 0.2 + Math.sin(phase) * 0.7;
          const r = ring * (1 + i * 0.22 + Math.sin(phase * 1.2) * 0.08 + eventA * 0.05);
          const hue = 196 + i * 14 + eventB * 18 + eventA * 8;
          ctx.strokeStyle = `hsla(${hue}, 100%, ${66 + eventA * 22 + eventB * 8}%, ${0.05 + energy * 0.22})`;
          ctx.lineWidth = Math.max(1, width * 0.001 + energy * 1.5);
          ctx.beginPath();
          ctx.ellipse(0, 0, r, r * squash, Math.sin(phase * 0.5) * 2.4, 0, Math.PI * 2);
          ctx.stroke();
        }

        const lattice = eventA + eventB * 0.75;
        if (lattice > 0.01) {
          const strands = 6;
          for (let i = 0; i < strands; i++) {
            const a = (i / strands) * Math.PI * 2 + t * (0.28 + eventB * 0.2);
            const r0 = ring * (0.58 + Math.sin(t * 2.4 + i) * 0.08);
            const r1 = ring * (1.82 + Math.cos(t * 2 + i * 0.7) * 0.09);
            const x0 = Math.cos(a) * r0;
            const y0 = Math.sin(a * (1.22 + eventA * 0.35)) * r0 * (0.36 + eventB * 0.12);
            const x1 = Math.cos(a + Math.PI * (0.58 + eventA * 0.1)) * r1;
            const y1 = Math.sin(a + Math.PI * 0.5) * r1 * (0.28 + eventB * 0.18);
            ctx.strokeStyle = `hsla(${212 + i * 6 + eventB * 24}, 100%, ${70 + eventA * 18}%, ${0.02 + lattice * 0.2})`;
            ctx.lineWidth = Math.max(0.8, width * 0.00055 + lattice * 1.2);
            ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.bezierCurveTo(x0 * 0.2, y1 * 0.3, x1 * 0.26, y0 * 0.36, x1, y1);
            ctx.stroke();
          }
        }
        ctx.restore();

        const glare = ctx.createRadialGradient(cx, cy, 0, cx, cy, ring * 2.8);
        glare.addColorStop(0, `rgba(244, 254, 255, ${0.06 + energy * 0.58})`);
        glare.addColorStop(0.22, `rgba(155, 240, 255, ${0.04 + eventA * 0.22 + eventB * 0.14})`);
        glare.addColorStop(0.44, `rgba(132, 182, 255, ${0.02 + eventB * 0.16})`);
        glare.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = glare;
        ctx.beginPath();
        ctx.arc(cx, cy, ring * 2.8, 0, Math.PI * 2);
        ctx.fill();

        const slitA = smoothstep(5.9, 6.08, t) * (1 - smoothstep(6.08, 6.2, t));
        const slitB = smoothstep(9.88, 10.0, t) * (1 - smoothstep(10.0, 10.14, t));
        const slit = Math.max(slitA, slitB);
        if (slit > 0.001) {
          const y = cy + Math.sin(t * 14) * height * 0.004;
          const lg = ctx.createLinearGradient(0, y, width, y);
          lg.addColorStop(0, "rgba(0,0,0,0)");
          lg.addColorStop(0.2, `rgba(136, 232, 255, ${0.06 + slit * 0.35})`);
          lg.addColorStop(0.5, `rgba(244, 255, 255, ${0.12 + slit * 0.6})`);
          lg.addColorStop(0.8, `rgba(136, 232, 255, ${0.06 + slit * 0.35})`);
          lg.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = lg;
          ctx.fillRect(width * 0.08, y - Math.max(1, height * 0.0018), width * 0.84, Math.max(2, height * 0.0036));
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawNexus(t) {
        const pull = smoothstep(8.1, 11.45, t);
        if (pull <= 0) return;
        const cx = width * 0.5;
        const cy = height * 0.5;
        const r = width * (0.025 + pull * 0.09);

        ctx.globalCompositeOperation = "lighter";
        const corona = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 8);
        corona.addColorStop(0, `rgba(224,252,255,${0.34 + pull * 0.58})`);
        corona.addColorStop(0.38, `rgba(113,226,255,${0.22 + pull * 0.42})`);
        corona.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = corona;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 8, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 8; i++) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(t * 0.65 + i * (Math.PI / 4));
          ctx.strokeStyle = `rgba(148, 237, 255, ${0.16 + pull * 0.42})`;
          ctx.lineWidth = Math.max(1.3, r * 0.028);
          ctx.beginPath();
          ctx.moveTo(r * (1.25 + i * 0.14), 0);
          ctx.quadraticCurveTo(r * (2.8 + i * 0.35), r * (0.4 + Math.sin(t * 1.6 + i) * 0.6), r * (4.6 + i * 0.42), 0);
          ctx.stroke();
          ctx.restore();
        }

        for (let i = 0; i < 5; i++) {
          const rr = r * (0.7 + i * 0.32 + pull * 1.1);
          ctx.strokeStyle = `rgba(123, 230, 255, ${0.05 + pull * 0.12})`;
          ctx.lineWidth = Math.max(1, r * 0.012);
          ctx.beginPath();
          ctx.ellipse(cx, cy, rr, rr * (0.34 + Math.sin(t * 0.8 + i) * 0.16), t * 0.22 + i * 0.6, 0, Math.PI * 2);
          ctx.stroke();
        }

        ctx.fillStyle = `rgba(238,255,255,${0.52 + pull * 0.48})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.48, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
      }

      function drawVignette(t) {
        const sink = smoothstep(7.8, 11.5, t);
        const edge = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.25, width * 0.5, height * 0.5, width * 0.8);
        edge.addColorStop(0, "rgba(0,0,0,0)");
        edge.addColorStop(1, `rgba(0, 0, 0, ${0.5 + sink * 0.34})`);
        ctx.fillStyle = edge;
        ctx.fillRect(0, 0, width, height);
      }

      function updateStatus(t) {
        const show = smoothstep(9.8, 11.4, t);
        statusEl.textContent = "NEXUS ARRIVAL";
        statusEl.classList.toggle("show", show > 0.08);
        statusEl.style.opacity = String(show);
      }

      function render(now) {
        const t = (now - startTime) / 1000;
        if (t > DURATION) {
          running = false;
          cancelAnimationFrame(raf);
          startBtn.classList.remove("hidden");
          return;
        }

        const p = phase01(t);
        const awaken = smoothstep(0.1, 1.2, t);
        const accelerate = smoothstep(1.0, 4.4, t);
        const dive = smoothstep(4.0, 8.5, t);
        const gravity = smoothstep(8.0, 11.5, t);
        const speed = 0.14 + awaken * 0.32 + accelerate * 1.5 + dive * 2.0 + gravity * 2.8 * (1 - smoothstep(11.0, 11.6, t));

        const camX = Math.sin(t * 0.4 + p * 2.4) * (0.05 + dive * 0.06) + Math.sin(t * 1.1) * 0.02;
        const camY = Math.cos(t * 0.33 + p * 1.8) * (0.045 + gravity * 0.04) + Math.sin(t * 0.9 + 1.3) * 0.02;

        ctx.clearRect(0, 0, width, height);
        drawBackground(t);
        drawStars(t, camX, camY, speed);
        drawMonoliths(t, camX, camY, speed);
        drawStreams(t, camX, camY, speed);
        drawShards(t, camX, camY, speed);
        drawPortals(t, camX, camY, speed);
        drawImpossibleBiology(t, camX, camY, speed);
        drawUncannyMoment(t);
        drawConsciousness(t);
        drawNexus(t);
        drawVignette(t);
        updateStatus(t);

        raf = requestAnimationFrame(render);
      }

      function runAudio() {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const master = audio.createGain();
        master.gain.value = 0.22;
        master.connect(audio.destination);

        const now = audio.currentTime;

        const sub = audio.createOscillator();
        sub.type = "sine";
        sub.frequency.setValueAtTime(30, now);
        sub.frequency.linearRampToValueAtTime(44, now + 3.8);
        sub.frequency.linearRampToValueAtTime(62, now + 8.8);
        sub.frequency.linearRampToValueAtTime(74, now + 11.2);
        const subGain = audio.createGain();
        subGain.gain.setValueAtTime(0.0001, now);
        subGain.gain.exponentialRampToValueAtTime(0.32, now + 1.2);
        subGain.gain.linearRampToValueAtTime(0.26, now + 9.2);
        subGain.gain.linearRampToValueAtTime(0.2, now + DURATION);
        sub.connect(subGain).connect(master);

        const chord = audio.createOscillator();
        chord.type = "triangle";
        chord.frequency.setValueAtTime(90, now + 0.4);
        chord.frequency.exponentialRampToValueAtTime(210, now + 6.5);
        chord.frequency.exponentialRampToValueAtTime(290, now + 10.2);
        const chordGain = audio.createGain();
        chordGain.gain.setValueAtTime(0.0001, now + 0.2);
        chordGain.gain.exponentialRampToValueAtTime(0.19, now + 4.4);
        chordGain.gain.linearRampToValueAtTime(0.13, now + DURATION);
        chord.connect(chordGain).connect(master);

        const noiseBuffer = audio.createBuffer(1, audio.sampleRate * 0.04, audio.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 160);
        }

        for (let i = 0; i < 40; i++) {
          const src = audio.createBufferSource();
          src.buffer = noiseBuffer;
          const g = audio.createGain();
          const when = now + 1.0 + i * 0.24 + Math.random() * 0.16;
          g.gain.setValueAtTime(0.05, when);
          g.gain.exponentialRampToValueAtTime(0.0001, when + 0.06);
          src.connect(g).connect(master);
          src.start(when);
        }

        const pull = audio.createOscillator();
        pull.type = "sawtooth";
        pull.frequency.setValueAtTime(340, now + 8.7);
        pull.frequency.exponentialRampToValueAtTime(62, now + 11.25);
        const pullGain = audio.createGain();
        pullGain.gain.setValueAtTime(0.0001, now + 8.6);
        pullGain.gain.exponentialRampToValueAtTime(0.4, now + 9.1);
        pullGain.gain.exponentialRampToValueAtTime(0.0001, now + 11.5);
        pull.connect(pullGain).connect(master);

        const bloom = audio.createOscillator();
        bloom.type = "sine";
        bloom.frequency.setValueAtTime(470, now + 5.7);
        bloom.frequency.exponentialRampToValueAtTime(138, now + 6.25);
        bloom.frequency.exponentialRampToValueAtTime(280, now + 6.75);
        const bloomGain = audio.createGain();
        bloomGain.gain.setValueAtTime(0.0001, now + 5.65);
        bloomGain.gain.exponentialRampToValueAtTime(0.18, now + 5.95);
        bloomGain.gain.exponentialRampToValueAtTime(0.0001, now + 6.82);
        bloom.connect(bloomGain).connect(master);

        const whisperBuffer = audio.createBuffer(1, audio.sampleRate * 0.35, audio.sampleRate);
        const whisperData = whisperBuffer.getChannelData(0);
        for (let i = 0; i < whisperData.length; i++) {
          const decay = Math.exp(-i / (audio.sampleRate * 0.09));
          whisperData[i] = (Math.random() * 2 - 1) * decay;
        }
        for (let i = 0; i < 3; i++) {
          const src = audio.createBufferSource();
          src.buffer = whisperBuffer;
          const bp = audio.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = 520 + i * 170;
          bp.Q.value = 8 + i * 2;
          const g = audio.createGain();
          const t0 = now + 9.58 + i * 0.16;
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(0.08 - i * 0.016, t0 + 0.06);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.3);
          src.connect(bp).connect(g).connect(master);
          src.start(t0);
        }

        const anomaly = audio.createOscillator();
        anomaly.type = "triangle";
        anomaly.frequency.setValueAtTime(980, now + 5.9);
        anomaly.frequency.exponentialRampToValueAtTime(1960, now + 6.02);
        anomaly.frequency.exponentialRampToValueAtTime(620, now + 6.2);
        anomaly.frequency.setValueAtTime(1320, now + 9.9);
        anomaly.frequency.exponentialRampToValueAtTime(760, now + 10.12);
        const anomalyGain = audio.createGain();
        anomalyGain.gain.setValueAtTime(0.0001, now + 5.86);
        anomalyGain.gain.exponentialRampToValueAtTime(0.06, now + 5.98);
        anomalyGain.gain.exponentialRampToValueAtTime(0.0001, now + 6.28);
        anomalyGain.gain.setValueAtTime(0.0001, now + 9.84);
        anomalyGain.gain.exponentialRampToValueAtTime(0.05, now + 9.98);
        anomalyGain.gain.exponentialRampToValueAtTime(0.0001, now + 10.22);
        anomaly.connect(anomalyGain).connect(master);

        sub.start(now);
        chord.start(now + 0.2);
        pull.start(now + 8.6);
        bloom.start(now + 5.65);
        anomaly.start(now + 5.84);

        sub.stop(now + DURATION + 0.2);
        chord.stop(now + DURATION + 0.2);
        pull.stop(now + DURATION + 0.2);
        bloom.stop(now + DURATION + 0.2);
        anomaly.stop(now + 10.3);
      }

      function begin() {
        if (running) return;
        running = true;
        startBtn.classList.add("hidden");
        statusEl.classList.remove("show");
        statusEl.textContent = "";
        startTime = performance.now();
        runAudio();
        raf = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      startBtn.addEventListener("click", begin);
      resize();
      drawBackground(0);
      drawConsciousness(0);
    </script>
  </body>
</html>
