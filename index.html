<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>System Awakening Sequence</title>
    <style>
      :root {
        --bg: #02030a;
        --fg: #c8f3ff;
      }

      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 50% 68%, #060d27 0%, #02040f 45%, #000 100%);
        color: var(--fg);
        font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(118%) contrast(112%);
      }

      .ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      #status {
        position: absolute;
        left: 50%;
        bottom: clamp(1.2rem, 4vh, 2.5rem);
        transform: translateX(-50%);
        padding: 0.42rem 0.85rem;
        letter-spacing: 0.26em;
        text-transform: uppercase;
        font-size: clamp(0.55rem, 1.15vw, 0.95rem);
        opacity: 0;
        color: rgba(214, 247, 255, 0.95);
        border: 1px solid rgba(120, 216, 255, 0.24);
        background: linear-gradient(90deg, rgba(6, 19, 44, 0.08), rgba(8, 26, 52, 0.26), rgba(6, 19, 44, 0.08));
        text-shadow: 0 0 16px rgba(95, 220, 255, 0.62);
      }

      #status.alert {
        border-color: rgba(255, 78, 78, 0.45);
        color: rgba(255, 194, 194, 0.96);
        text-shadow: 0 0 16px rgba(255, 70, 70, 0.7);
      }

      #startBtn {
        position: fixed;
        top: 1rem;
        right: 1rem;
        pointer-events: auto;
        border: 1px solid rgba(108, 196, 255, 0.35);
        color: rgba(214, 247, 255, 0.92);
        background: rgba(2, 8, 20, 0.62);
        border-radius: 999px;
        padding: 0.68rem 0.98rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.68rem;
        cursor: pointer;
      }

      #startBtn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="ui">
      <div id="status" aria-live="polite"></div>
      <button id="startBtn">Awaken</button>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");

      const DURATION = 11.2;
      const STAR_COUNT = 240;
      const ARC_COUNT = 64;
      const NODE_COUNT = 90;
      const BAR_COUNT = 18;

      const PHASES = [
        { id: 1, name: "DORMANT FIELD", start: 0.0, end: 1.8 },
        { id: 2, name: "FIRST IGNITION", start: 1.8, end: 3.1 },
        { id: 3, name: "INITIALIZING", start: 3.1, end: 5.1 },
        { id: 4, name: "SYNC SCANNING", start: 5.1, end: 7.5 },
        { id: 5, name: "CORE ACTIVATION", start: 7.5, end: 9.8 },
        { id: 6, name: "SYSTEM AWAKE", start: 9.8, end: 11.2 },
      ];

      let width = 0;
      let height = 0;
      let raf = null;
      let running = false;
      let startTime = 0;

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      function smoothstep(a, b, x) {
        const t = clamp01((x - a) / (b - a));
        return t * t * (3 - 2 * t);
      }
      function pulse(t, start, peak, end) {
        return smoothstep(start, peak, t) * (1 - smoothstep(peak, end, t));
      }

      function phaseLevel(t, s, e) {
        return smoothstep(s - 0.25, s + 0.55, t) * (1 - smoothstep(e - 0.55, e + 0.25, t));
      }

      function currentPhase(t) {
        return PHASES.find((p) => t >= p.start && t <= p.end) || PHASES[PHASES.length - 1];
      }

      const stars = Array.from({ length: STAR_COUNT }, () => ({
        r: 0.2 + Math.random() * 1.6,
        a: Math.random() * Math.PI * 2,
        z: Math.random(),
        tw: Math.random() * Math.PI * 2,
      }));

      const arcs = Array.from({ length: ARC_COUNT }, () => ({
        band: 0.2 + Math.random() * 0.75,
        angle: Math.random() * Math.PI * 2,
        width: 0.08 + Math.random() * 0.35,
        spin: (Math.random() * 2 - 1) * (0.2 + Math.random() * 1.6),
        dashA: 4 + Math.random() * 15,
        dashB: 6 + Math.random() * 25,
        lane: Math.random(),
      }));

      const nodes = Array.from({ length: NODE_COUNT }, () => ({
        ring: 0.18 + Math.random() * 0.82,
        angle: Math.random() * Math.PI * 2,
        drift: (Math.random() * 2 - 1) * 0.08,
        seed: Math.random(),
      }));

      const bars = Array.from({ length: BAR_COUNT }, (_, i) => ({
        y: 0.2 + i * (0.6 / BAR_COUNT),
        len: 0.2 + Math.random() * 0.5,
        seed: Math.random(),
      }));

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.width = Math.floor(window.innerWidth * dpr);
        height = canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      function drawBackground(t, levels) {
        const { dormant, ignition, init, scan, core, lock } = levels;

        const g = ctx.createRadialGradient(width * 0.5, height * (0.57 - lock * 0.02), width * 0.02, width * 0.5, height * 0.52, width * 0.9);
        g.addColorStop(0, `rgba(${Math.floor(8 + core * 24)}, ${Math.floor(18 + scan * 56)}, ${Math.floor(42 + core * 90)}, 0.95)`);
        g.addColorStop(0.55, `rgba(${Math.floor(2 + ignition * 8)}, ${Math.floor(8 + init * 18)}, ${Math.floor(26 + scan * 34)}, 0.96)`);
        g.addColorStop(1, "rgba(0,0,0,1)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        const haze = ctx.createLinearGradient(0, 0, 0, height);
        haze.addColorStop(0, `rgba(8,16,34,${0.16 + dormant * 0.2})`);
        haze.addColorStop(0.5, `rgba(10,25,58,${0.1 + scan * 0.18 + core * 0.16})`);
        haze.addColorStop(1, `rgba(0,0,0,${0.5 + lock * 0.2})`);
        ctx.fillStyle = haze;
        ctx.fillRect(0, 0, width, height);

        const noiseOpacity = 0.018 + scan * 0.03 + lock * 0.02;
        ctx.fillStyle = `rgba(145, 211, 255, ${noiseOpacity})`;
        for (let i = 0; i < 26; i++) {
          const y = ((i * 37 + t * 80) % (height + 120)) - 60;
          ctx.fillRect(0, y, width, 1);
        }
      }

      function drawSpatialDust(t, levels) {
        const strength = 0.15 + levels.ignition * 0.4 + levels.scan * 0.6;
        ctx.globalCompositeOperation = "lighter";
        for (const s of stars) {
          const orbit = s.a + t * (0.03 + s.z * 0.18);
          const radius = Math.min(width, height) * (0.09 + s.r * (0.5 + levels.core * 0.2));
          const x = width * 0.5 + Math.cos(orbit) * radius * (1 + s.z * 0.15);
          const y = height * 0.53 + Math.sin(orbit * (1.2 + s.z * 0.4) + s.tw) * radius * 0.55;
          const tw = 0.35 + 0.65 * Math.sin(t * 2.2 + s.tw + s.z * 6);
          const alpha = strength * tw * (0.2 + s.z * 0.35);
          ctx.fillStyle = `rgba(${150 + Math.floor(levels.lock * 90)}, ${210 + Math.floor(levels.core * 35)}, 255, ${alpha})`;
          ctx.fillRect(x, y, 1 + s.z * 1.6, 1 + s.z * 1.6);
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawCoreArchitecture(t, levels) {
        const cx = width * 0.5;
        const cy = height * 0.52;
        const unit = Math.min(width, height);
        const zoom = 1 + levels.scan * 0.07 + levels.core * 0.14 + levels.lock * 0.1;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(zoom, zoom);

        // Outer containment ring
        const outerR = unit * (0.29 + levels.init * 0.02 + levels.core * 0.03);
        ctx.strokeStyle = `rgba(84, 185, 255, ${0.1 + levels.init * 0.25 + levels.scan * 0.18})`;
        ctx.lineWidth = Math.max(1.2, unit * 0.0019);
        ctx.setLineDash([18, 22]);
        ctx.beginPath();
        ctx.arc(0, 0, outerR, 0, Math.PI * 2);
        ctx.stroke();

        // Arc rings / moving segments
        for (const a of arcs) {
          const r = outerR * (0.35 + a.band * 0.85);
          const spin = t * a.spin * (0.22 + levels.scan * 0.8 + levels.core * 0.45);
          const from = a.angle + spin;
          const to = from + a.width * (0.35 + levels.init * 1.25 + levels.scan * 1.2);
          const heat = pulse(t, 7.7, 8.6, 9.65) * (0.3 + a.lane * 0.8);
          const red = Math.floor(70 + heat * 170);
          const blue = Math.floor(170 + levels.scan * 60);
          ctx.strokeStyle = `rgba(${red}, ${70 + Math.floor(heat * 55)}, ${blue}, ${0.06 + levels.init * 0.15 + levels.scan * 0.18 + levels.core * 0.26})`;
          ctx.lineWidth = Math.max(1, unit * (0.0009 + a.lane * 0.0018));
          ctx.setLineDash([a.dashA, a.dashB]);
          ctx.beginPath();
          ctx.arc(0, 0, r, from, to);
          ctx.stroke();
        }

        // Radial lock spokes
        const spokeCount = 12;
        const spokeEnergy = levels.scan * 0.9 + levels.core * 1.2 + levels.lock * 1.1;
        ctx.setLineDash([]);
        for (let i = 0; i < spokeCount; i++) {
          const a = (i / spokeCount) * Math.PI * 2 + t * (0.1 + levels.core * 0.4);
          const inner = unit * (0.04 + levels.ignition * 0.01);
          const outer = unit * (0.23 + levels.scan * 0.07 + Math.sin(t * 1.2 + i) * 0.01);
          const pulseAlpha = 0.04 + 0.26 * clamp01(spokeEnergy - i * 0.03);
          ctx.strokeStyle = `rgba(${80 + Math.floor(levels.core * 120)}, ${140 + Math.floor(levels.scan * 70)}, 255, ${pulseAlpha})`;
          ctx.lineWidth = Math.max(1, unit * (0.0008 + levels.core * 0.0011));
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
          ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
          ctx.stroke();
        }

        // Calibration nodes + link arcs
        ctx.globalCompositeOperation = "lighter";
        for (const n of nodes) {
          const aa = n.angle + t * (0.2 + n.seed * 0.25 + levels.scan * 0.85);
          const rr = outerR * (0.22 + n.ring * 0.7);
          const nx = Math.cos(aa) * rr;
          const ny = Math.sin(aa) * rr * (0.82 + Math.sin(t * 0.4 + n.seed * 4) * 0.09);
          const active = 0.15 + levels.init * 0.35 + levels.scan * 0.5 + levels.core * 0.5;
          ctx.fillStyle = `rgba(${120 + Math.floor(levels.core * 100)}, ${200 + Math.floor(levels.scan * 45)}, 255, ${active * (0.15 + n.seed * 0.45)})`;
          ctx.beginPath();
          ctx.arc(nx, ny, 1 + unit * 0.0018 + n.seed * 1.3, 0, Math.PI * 2);
          ctx.fill();

          if (n.seed > 0.7 && levels.scan > 0.12) {
            ctx.strokeStyle = `rgba(120, 213, 255, ${0.06 + levels.scan * 0.22})`;
            ctx.lineWidth = Math.max(0.8, unit * 0.0008);
            ctx.beginPath();
            ctx.moveTo(nx * 0.6, ny * 0.6);
            ctx.lineTo(nx, ny);
            ctx.stroke();
          }
        }
        ctx.globalCompositeOperation = "source-over";

        // Reactor core and pressure bloom
        const corePulse = 0.3 + 0.7 * Math.sin(t * (1.5 + levels.core * 1.8));
        const reactor = unit * (0.028 + levels.init * 0.02 + levels.core * 0.05 + levels.lock * 0.03);
        const heat = pulse(t, 7.6, 8.9, 10.2) + pulse(t, 9.9, 10.5, 11.2) * 0.8;

        const rg = ctx.createRadialGradient(0, 0, 0, 0, 0, reactor * 9);
        rg.addColorStop(0, `rgba(238, 252, 255, ${0.55 + levels.core * 0.35})`);
        rg.addColorStop(0.25, `rgba(${90 + Math.floor(heat * 160)}, ${170 + Math.floor(levels.scan * 40)}, 255, ${0.48 + levels.core * 0.32})`);
        rg.addColorStop(0.55, `rgba(${50 + Math.floor(heat * 120)}, ${80 + Math.floor(heat * 40)}, ${240 - Math.floor(heat * 70)}, ${0.2 + levels.core * 0.22})`);
        rg.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = rg;
        ctx.beginPath();
        ctx.arc(0, 0, reactor * 9, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(${95 + Math.floor(heat * 150)}, ${180 - Math.floor(heat * 70)}, 255, ${0.3 + levels.core * 0.5})`;
        ctx.lineWidth = Math.max(1.2, unit * 0.0028);
        ctx.beginPath();
        ctx.arc(0, 0, reactor * (2.6 + corePulse * 0.8), 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = `rgba(245,255,255,${0.66 + levels.core * 0.3 + levels.lock * 0.2})`;
        ctx.beginPath();
        ctx.arc(0, 0, reactor * (0.45 + corePulse * 0.14), 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function drawScanningSystems(t, levels) {
        const cx = width * 0.5;
        const cy = height * 0.52;

        // Horizontal diagnostic bars
        const visible = levels.init + levels.scan + levels.core + levels.lock;
        if (visible > 0.02) {
          for (const b of bars) {
            const y = height * b.y;
            const wave = 0.5 + 0.5 * Math.sin(t * (1.6 + b.seed * 3.1) + b.seed * 9);
            const len = width * (0.08 + b.len * (0.2 + levels.scan * 0.16 + levels.core * 0.12));
            const x = cx - len * 0.5 + Math.sin(t * 0.8 + b.seed * 6) * width * 0.08;
            const alpha = (0.02 + visible * 0.18) * wave;
            ctx.fillStyle = `rgba(${70 + Math.floor(levels.core * 140)}, ${170 + Math.floor(levels.scan * 55)}, 255, ${alpha})`;
            ctx.fillRect(x, y, len * wave, 1 + levels.scan * 2.2);
          }
        }

        // Vertical lock beams
        const beam = levels.scan * 0.8 + levels.core * 1.2 + levels.lock * 1.6;
        if (beam > 0.04) {
          for (let i = -2; i <= 2; i++) {
            const x = cx + i * width * 0.08 + Math.sin(t * 0.7 + i) * width * 0.005;
            const top = cy - height * (0.24 + levels.core * 0.16);
            const bottom = cy + height * (0.24 + levels.core * 0.1);
            const warning = i === 0 ? pulse(t, 8.0, 8.8, 9.8) + pulse(t, 10.0, 10.5, 11.2) : 0;
            const r = 90 + Math.floor(warning * 145);
            const g = 165 - Math.floor(warning * 70);
            ctx.strokeStyle = `rgba(${r}, ${g}, 255, ${0.05 + beam * 0.22})`;
            ctx.lineWidth = Math.max(1, 1 + beam * 2.2 - Math.abs(i) * 0.35);
            ctx.beginPath();
            ctx.moveTo(x, top);
            ctx.lineTo(x, bottom);
            ctx.stroke();
          }
        }

        // Sweeping scan line
        const sweep = clamp01(levels.ignition * 0.4 + levels.init * 0.8 + levels.scan * 1.2 + levels.core * 0.5);
        if (sweep > 0.02) {
          const y = height * (0.22 + ((t * 0.22) % 0.56));
          const lg = ctx.createLinearGradient(0, y, width, y);
          lg.addColorStop(0, "rgba(0,0,0,0)");
          lg.addColorStop(0.18, `rgba(120,210,255,${0.04 + sweep * 0.11})`);
          lg.addColorStop(0.5, `rgba(235,250,255,${0.08 + sweep * 0.2})`);
          lg.addColorStop(0.82, `rgba(120,210,255,${0.04 + sweep * 0.11})`);
          lg.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = lg;
          ctx.fillRect(width * 0.05, y - 1.5, width * 0.9, 3.0 + levels.scan * 1.5);
        }
      }

      function drawFrameAndLock(t, levels) {
        const p = levels.init + levels.scan + levels.core + levels.lock;
        if (p <= 0.02) return;

        const w = width * (0.78 - levels.lock * 0.06);
        const h = height * (0.62 - levels.lock * 0.08);
        const x = (width - w) / 2;
        const y = height * 0.52 - h / 2;

        ctx.strokeStyle = `rgba(85, 180, 255, ${0.08 + p * 0.15})`;
        ctx.lineWidth = 1.4;
        ctx.strokeRect(x, y, w, h);

        const corner = 26 + levels.core * 24;
        const al = 0.18 + p * 0.28;
        ctx.strokeStyle = `rgba(${90 + Math.floor(levels.core * 140)}, ${170 - Math.floor(levels.core * 60)}, 255, ${al})`;
        ctx.lineWidth = 2;

        function cornerMark(px, py, sx, sy) {
          ctx.beginPath();
          ctx.moveTo(px, py + sy * corner);
          ctx.lineTo(px, py);
          ctx.lineTo(px + sx * corner, py);
          ctx.stroke();
        }

        cornerMark(x, y, 1, 1);
        cornerMark(x + w, y, -1, 1);
        cornerMark(x, y + h, 1, -1);
        cornerMark(x + w, y + h, -1, -1);

        const lockPulse = pulse(t, 9.95, 10.55, 11.15);
        if (lockPulse > 0.01) {
          const cx = width * 0.5;
          const cy = height * 0.52;
          const rr = Math.min(width, height) * (0.08 + lockPulse * 0.3);
          ctx.globalCompositeOperation = "lighter";
          ctx.strokeStyle = `rgba(255, 74, 90, ${0.08 + lockPulse * 0.46})`;
          ctx.lineWidth = 1.8 + lockPulse * 3;
          ctx.beginPath();
          ctx.arc(cx, cy, rr, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalCompositeOperation = "source-over";
        }
      }

      function drawFinalPulse(t, levels) {
        const hit = pulse(t, 10.25, 10.78, 11.2);
        if (hit <= 0.001) return;

        const cx = width * 0.5;
        const cy = height * 0.52;
        const r = Math.min(width, height) * (0.16 + hit * 0.46);

        ctx.globalCompositeOperation = "lighter";

        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.4);
        g.addColorStop(0, `rgba(242, 254, 255, ${0.26 + hit * 0.58})`);
        g.addColorStop(0.32, `rgba(100, 217, 255, ${0.18 + hit * 0.3})`);
        g.addColorStop(0.56, `rgba(255, 70, 78, ${0.06 + hit * 0.22})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 2.4, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(200, 244, 255, ${0.3 + hit * 0.45})`;
        ctx.lineWidth = 1.4 + hit * 2.6;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.globalCompositeOperation = "source-over";
      }

      function drawVignette(levels) {
        const g = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.2, width * 0.5, height * 0.5, width * 0.82);
        g.addColorStop(0, "rgba(0,0,0,0)");
        g.addColorStop(1, `rgba(0, 0, 0, ${0.52 + levels.core * 0.22 + levels.lock * 0.2})`);
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);
      }

      function updateStatus(t, levels) {
        const p = currentPhase(t);
        const dominantRed = pulse(t, 7.8, 8.8, 9.8) + pulse(t, 10.0, 10.6, 11.2);
        const text =
          p.id === 6
            ? "SYSTEM AWAKE"
            : p.id === 5
            ? "REACTOR ONLINE"
            : p.id === 4
            ? "SIGNAL LOCK"
            : p.id === 3
            ? "CALIBRATING"
            : p.id === 2
            ? "INITIALIZING"
            : "DORMANT PRESENCE";

        statusEl.textContent = text;
        const show = clamp01(levels.ignition * 0.75 + levels.init + levels.scan + levels.core + levels.lock);
        statusEl.style.opacity = String(0.04 + show * 0.9);
        statusEl.classList.toggle("alert", dominantRed > 0.35 && p.id >= 4);
      }

      function render(now) {
        const t = (now - startTime) / 1000;
        if (t > DURATION) {
          running = false;
          cancelAnimationFrame(raf);
          startBtn.classList.remove("hidden");
          return;
        }

        const levels = {
          dormant: phaseLevel(t, 0.0, 2.3),
          ignition: phaseLevel(t, 1.7, 3.4),
          init: phaseLevel(t, 3.0, 5.5),
          scan: phaseLevel(t, 5.0, 7.9),
          core: phaseLevel(t, 7.3, 10.1),
          lock: phaseLevel(t, 9.7, 11.2),
        };

        ctx.clearRect(0, 0, width, height);
        drawBackground(t, levels);
        drawSpatialDust(t, levels);
        drawCoreArchitecture(t, levels);
        drawScanningSystems(t, levels);
        drawFrameAndLock(t, levels);
        drawFinalPulse(t, levels);
        drawVignette(levels);
        updateStatus(t, levels);

        raf = requestAnimationFrame(render);
      }

      function runAudio() {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;

        const audio = new AC();
        const master = audio.createGain();
        master.gain.value = 0.24;
        master.connect(audio.destination);

        const now = audio.currentTime;
        const end = now + DURATION + 0.2;

        // Dormant pressure bed
        const sub = audio.createOscillator();
        sub.type = "sine";
        sub.frequency.setValueAtTime(29, now);
        sub.frequency.linearRampToValueAtTime(42, now + 3.5);
        sub.frequency.linearRampToValueAtTime(57, now + 7.8);
        sub.frequency.linearRampToValueAtTime(72, now + 10.9);
        const subGain = audio.createGain();
        subGain.gain.setValueAtTime(0.0001, now);
        subGain.gain.exponentialRampToValueAtTime(0.34, now + 1.4);
        subGain.gain.linearRampToValueAtTime(0.28, now + 9.9);
        subGain.gain.linearRampToValueAtTime(0.23, end);
        sub.connect(subGain).connect(master);

        // High control tone
        const control = audio.createOscillator();
        control.type = "triangle";
        control.frequency.setValueAtTime(96, now + 0.4);
        control.frequency.exponentialRampToValueAtTime(220, now + 5.1);
        control.frequency.exponentialRampToValueAtTime(312, now + 9.3);
        const controlGain = audio.createGain();
        controlGain.gain.setValueAtTime(0.0001, now + 0.2);
        controlGain.gain.exponentialRampToValueAtTime(0.16, now + 3.6);
        controlGain.gain.linearRampToValueAtTime(0.11, end);
        control.connect(controlGain).connect(master);

        // ignition tick + scanning ticks
        const tickBuffer = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.05), audio.sampleRate);
        const td = tickBuffer.getChannelData(0);
        for (let i = 0; i < td.length; i++) {
          td[i] = (Math.random() * 2 - 1) * Math.exp(-i / 180);
        }

        function scheduleTick(time, volume = 0.06, hz = 1200) {
          const src = audio.createBufferSource();
          src.buffer = tickBuffer;
          const bp = audio.createBiquadFilter();
          bp.type = "bandpass";
          bp.frequency.value = hz;
          bp.Q.value = 6;
          const g = audio.createGain();
          g.gain.setValueAtTime(volume, time);
          g.gain.exponentialRampToValueAtTime(0.0001, time + 0.07);
          src.connect(bp).connect(g).connect(master);
          src.start(time);
        }

        scheduleTick(now + 1.95, 0.11, 980);
        for (let i = 0; i < 22; i++) {
          const tt = now + 4.9 + i * 0.18 + Math.random() * 0.05;
          scheduleTick(tt, 0.028 + (i / 22) * 0.03, 900 + (i % 5) * 180);
        }

        // Reactor growl (controlled red phase)
        const growl = audio.createOscillator();
        growl.type = "sawtooth";
        growl.frequency.setValueAtTime(180, now + 7.5);
        growl.frequency.exponentialRampToValueAtTime(74, now + 9.7);
        const growlGain = audio.createGain();
        growlGain.gain.setValueAtTime(0.0001, now + 7.4);
        growlGain.gain.exponentialRampToValueAtTime(0.18, now + 8.1);
        growlGain.gain.exponentialRampToValueAtTime(0.0001, now + 10.1);
        growl.connect(growlGain).connect(master);

        // Final online impact
        const impact = audio.createOscillator();
        impact.type = "triangle";
        impact.frequency.setValueAtTime(530, now + 10.28);
        impact.frequency.exponentialRampToValueAtTime(118, now + 10.86);
        const impactGain = audio.createGain();
        impactGain.gain.setValueAtTime(0.0001, now + 10.2);
        impactGain.gain.exponentialRampToValueAtTime(0.34, now + 10.34);
        impactGain.gain.exponentialRampToValueAtTime(0.0001, now + 11.16);
        impact.connect(impactGain).connect(master);

        // Broadband bloom tail
        const tailBuffer = audio.createBuffer(1, Math.floor(audio.sampleRate * 0.6), audio.sampleRate);
        const tail = tailBuffer.getChannelData(0);
        for (let i = 0; i < tail.length; i++) {
          tail[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audio.sampleRate * 0.08));
        }
        const tailSrc = audio.createBufferSource();
        tailSrc.buffer = tailBuffer;
        const lp = audio.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.value = 2400;
        const tailGain = audio.createGain();
        tailGain.gain.setValueAtTime(0.0001, now + 10.34);
        tailGain.gain.exponentialRampToValueAtTime(0.11, now + 10.46);
        tailGain.gain.exponentialRampToValueAtTime(0.0001, now + 11.2);
        tailSrc.connect(lp).connect(tailGain).connect(master);

        sub.start(now);
        control.start(now + 0.2);
        growl.start(now + 7.4);
        impact.start(now + 10.2);
        tailSrc.start(now + 10.34);

        sub.stop(end);
        control.stop(end);
        growl.stop(now + 10.15);
        impact.stop(now + 11.2);
      }

      function begin() {
        if (running) return;
        running = true;
        startBtn.classList.add("hidden");
        startTime = performance.now();
        runAudio();
        raf = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      startBtn.addEventListener("click", begin);
      resize();
      drawBackground(0, { dormant: 1, ignition: 0, init: 0, scan: 0, core: 0, lock: 0 });
      statusEl.textContent = "DORMANT PRESENCE";
      statusEl.style.opacity = "0.35";
    </script>
  </body>
</html>
