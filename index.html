<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinematic Machine Flythrough</title>
    <style>
      :root {
        --bg0: #010106;
        --bg1: #04071a;
        --fg: #dff7ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(circle at 50% 82%, var(--bg1) 0%, var(--bg0) 52%, #000 100%);
        color: var(--fg);
        font-family: Inter, "Segoe UI", system-ui, sans-serif;
      }

      #scene {
        width: 100%;
        height: 100%;
        display: block;
        filter: saturate(140%) contrast(116%);
      }

      .overlay {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: end center;
        pointer-events: none;
        padding: 2rem;
      }

      #status {
        opacity: 0;
        letter-spacing: 0.38rem;
        font-size: clamp(0.72rem, 1.6vw, 1.2rem);
        text-transform: uppercase;
        text-shadow: 0 0 24px rgba(123, 241, 255, 0.7);
        transition: opacity 480ms ease;
      }

      #status.show {
        opacity: 1;
      }

      #startBtn {
        position: fixed;
        top: 1.05rem;
        right: 1.05rem;
        pointer-events: auto;
        border: 1px solid rgba(132, 240, 255, 0.28);
        color: rgba(225, 249, 255, 0.86);
        background: rgba(1, 5, 14, 0.45);
        border-radius: 999px;
        padding: 0.66rem 0.9rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.68rem;
        cursor: pointer;
        box-shadow: 0 0 18px rgba(46, 111, 255, 0.1);
        backdrop-filter: blur(6px);
      }

      #startBtn.hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="overlay">
      <div id="status" aria-live="polite"></div>
      <button id="startBtn">Awaken</button>
    </div>

    <script>
      const canvas = document.getElementById("scene");
      const ctx = canvas.getContext("2d");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");

      const DURATION = 11.4;
      const STAR_COUNT = 1400;
      const RAIL_COUNT = 210;
      const NODE_COUNT = 270;
      const RING_COUNT = 65;

      let width = 0;
      let height = 0;
      let raf = null;
      let startTime = 0;
      let running = false;

      const stars = Array.from({ length: STAR_COUNT }, () => ({
        x: Math.random() * 2 - 1,
        y: Math.random() * 2 - 1,
        z: Math.random(),
        tw: Math.random() * Math.PI * 2,
        seed: Math.random(),
      }));

      const rails = Array.from({ length: RAIL_COUNT }, () => ({
        lane: (Math.random() * 2 - 1) * 1.45,
        baseY: (Math.random() * 2 - 1) * 1.1,
        z: Math.random(),
        width: Math.random() * 0.03 + 0.006,
        phase: Math.random() * Math.PI * 2,
        seed: Math.random(),
      }));

      const nodes = Array.from({ length: NODE_COUNT }, () => ({
        x: (Math.random() * 2 - 1) * 1.45,
        y: (Math.random() * 2 - 1) * 1.2,
        z: Math.random(),
        r: Math.random() * 0.018 + 0.005,
        seed: Math.random(),
        p: Math.random() * Math.PI * 2,
      }));

      const rings = Array.from({ length: RING_COUNT }, () => ({
        z: Math.random(),
        radius: Math.random() * 0.58 + 0.24,
        tilt: (Math.random() * 2 - 1) * 0.6,
        seed: Math.random(),
        spin: (Math.random() * 2 - 1) * 0.8,
      }));

      const clamp01 = (v) => Math.max(0, Math.min(1, v));
      const lerp = (a, b, t) => a + (b - a) * t;
      function smoothstep(a, b, x) {
        const t = clamp01((x - a) / (b - a));
        return t * t * (3 - 2 * t);
      }

      function easeOutExpo(x) {
        return x >= 1 ? 1 : 1 - 2 ** (-10 * x);
      }

      function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        width = canvas.width = Math.floor(window.innerWidth * dpr);
        height = canvas.height = Math.floor(window.innerHeight * dpr);
        canvas.style.width = `${window.innerWidth}px`;
        canvas.style.height = `${window.innerHeight}px`;
      }

      function project(x, y, z, t, camX, camY) {
        const zz = Math.max(0.02, z);
        const warp = 0.06 * Math.sin(t * 0.75 + zz * 9 + x * 2.4);
        const warp2 = 0.05 * Math.cos(t * 0.67 + zz * 11 + y * 2.2);
        const depth = 2.25 / zz;
        return {
          x: width * (0.5 + (x + warp + camX * zz) * depth * 0.26),
          y: height * (0.5 + (y + warp2 + camY * zz) * depth * 0.26),
          depth,
          z: zz,
        };
      }

      function drawBackground(t) {
        const awaken = smoothstep(0.1, 1.8, t);
        const rush = smoothstep(2.1, 7.8, t);
        const arrival = smoothstep(8.1, 11.2, t);

        const g = ctx.createRadialGradient(
          width * (0.5 + Math.sin(t * 0.11) * 0.03),
          height * (0.62 - arrival * 0.07),
          width * (0.02 + awaken * 0.05),
          width * 0.5,
          height * 0.56,
          width * 0.95
        );
        g.addColorStop(0, `hsla(${214 + rush * 12}, 100%, ${4 + awaken * 16 + arrival * 14}%, 0.98)`);
        g.addColorStop(0.48, `hsla(${233 + rush * 8}, 72%, ${3 + awaken * 7}%, 0.9)`);
        g.addColorStop(1, "rgba(0,0,0,0.99)");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, width, height);

        const vignette = ctx.createLinearGradient(0, 0, width, height);
        vignette.addColorStop(0, `rgba(6, 18, 42, ${0.06 + rush * 0.08})`);
        vignette.addColorStop(1, `rgba(0, 0, 0, ${0.32 + arrival * 0.16})`);
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);
      }

      function advanceZ(p, speed, dt = 0.016) {
        p.z -= speed * dt;
        if (p.z < 0.015) p.z += 1;
      }

      function drawStars(t, camX, camY, speed) {
        const awaken = smoothstep(0, 2.2, t);
        const rush = smoothstep(1.7, 7.5, t);
        const flash = smoothstep(9.2, 11.2, t);
        const dt = 0.016;

        for (const p of stars) {
          advanceZ(p, speed * (0.55 + p.seed * 0.8), dt);
          const q = project(p.x, p.y, p.z, t, camX, camY);
          if (q.x < -20 || q.x > width + 20 || q.y < -20 || q.y > height + 20) continue;

          const tw = 0.5 + 0.5 * Math.sin(t * (2 + p.seed * 5) + p.tw + p.z * 10);
          const streak = 1 + rush * q.depth * 0.42;
          const size = (0.35 + (1 - p.z) * 1.6) * q.depth * 0.38;
          const hue = lerp(198, 216, p.seed);
          const a = (0.05 + awaken * 0.38 + flash * 0.2) * (0.45 + tw * 0.75);

          ctx.strokeStyle = `hsla(${hue}, 100%, ${72 + tw * 20}%, ${a})`;
          ctx.lineWidth = Math.max(1, size * 0.9);
          ctx.beginPath();
          ctx.moveTo(q.x, q.y);
          ctx.lineTo(q.x - streak * speed * 0.9, q.y + streak * 0.4);
          ctx.stroke();
        }
      }

      function drawRails(t, camX, camY, speed) {
        const build = smoothstep(1.2, 5.2, t);
        const dense = smoothstep(4.5, 9.3, t);
        const dt = 0.016;

        ctx.globalCompositeOperation = "lighter";
        for (const r of rails) {
          advanceZ(r, speed * (1.2 + r.seed), dt);
          const wave = Math.sin(t * 1.25 + r.phase + r.z * 8) * 0.3;
          const y = r.baseY + wave * (0.2 + dense * 0.35);

          const a = project(r.lane - r.width, y, r.z, t, camX * 1.3, camY * 1.2);
          const b = project(r.lane + r.width, y, Math.min(1, r.z + 0.07), t, camX * 1.3, camY * 1.2);
          const c = project(r.lane, y + 0.09, Math.min(1, r.z + 0.13), t, camX * 1.2, camY * 1.2);

          const alpha = (0.03 + build * 0.2 + dense * 0.2) * (1.1 - r.z);
          const hue = 194 + Math.sin(r.seed * 16 + t * 0.4) * 22;

          ctx.fillStyle = `hsla(${hue}, 100%, ${58 + dense * 22}%, ${alpha})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.lineTo(c.x, c.y);
          ctx.closePath();
          ctx.fill();

          if (dense > 0.35) {
            ctx.strokeStyle = `hsla(${hue + 12}, 100%, 78%, ${alpha * 0.9})`;
            ctx.lineWidth = Math.max(1, a.depth * 0.6);
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawNodes(t, camX, camY, speed) {
        const rise = smoothstep(0.6, 3.2, t);
        const discover = smoothstep(2.5, 8.4, t);
        const arrival = smoothstep(8.5, 11.2, t);
        const dt = 0.016;

        ctx.globalCompositeOperation = "lighter";
        for (const n of nodes) {
          advanceZ(n, speed * (0.85 + n.seed * 1.2), dt);
          n.x += Math.sin(t * 0.5 + n.p + n.seed * 7) * 0.0007;
          n.y += Math.cos(t * 0.42 + n.p) * 0.0006;

          if (n.x > 1.5) n.x = -1.5;
          if (n.x < -1.5) n.x = 1.5;
          if (n.y > 1.28) n.y = -1.28;
          if (n.y < -1.28) n.y = 1.28;

          const p = project(n.x, n.y, n.z, t, camX * 1.1, camY * 1.1);
          if (p.x < -30 || p.x > width + 30 || p.y < -30 || p.y > height + 30) continue;

          const glowR = n.r * p.depth * width * (0.008 + discover * 0.006);
          const pulse = 0.5 + 0.5 * Math.sin(t * 4.2 + n.seed * 12 + n.z * 20);
          const alpha = (0.04 + rise * 0.26 + arrival * 0.14) * (1.15 - n.z) * (0.55 + pulse * 0.75);
          const hue = 188 + pulse * 38;

          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, glowR * 3.8);
          g.addColorStop(0, `hsla(${hue}, 100%, 82%, ${alpha})`);
          g.addColorStop(0.3, `hsla(${hue + 18}, 100%, 66%, ${alpha * 0.66})`);
          g.addColorStop(1, "rgba(0,0,0,0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, glowR * 3.8, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalCompositeOperation = "source-over";
      }

      function drawRings(t, camX, camY, speed) {
        const discover = smoothstep(3.2, 8.8, t);
        const corridor = smoothstep(6.2, 11.2, t);
        const dt = 0.016;

        ctx.globalCompositeOperation = "lighter";
        for (const r of rings) {
          advanceZ(r, speed * (1.45 + r.seed), dt);
          const p = project(0, 0, r.z, t, camX * 0.9, camY * 0.9);
          const radius = (r.radius + Math.sin(t * 0.8 + r.seed * 10) * 0.03) * p.depth * width * 0.055;
          const alpha = (0.02 + discover * 0.2 + corridor * 0.2) * (1.08 - r.z);

          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(r.spin * t * 0.27 + r.tilt);
          ctx.scale(1, 0.42 + Math.sin(t * 0.6 + r.seed * 5) * 0.08);
          ctx.strokeStyle = `hsla(${200 + r.seed * 26}, 100%, ${56 + corridor * 28}%, ${alpha})`;
          ctx.lineWidth = Math.max(1, p.depth * 0.45);
          ctx.setLineDash([18 + r.seed * 28, 12 + (1 - r.seed) * 24]);
          ctx.beginPath();
          ctx.arc(0, 0, radius, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        ctx.setLineDash([]);
        ctx.globalCompositeOperation = "source-over";
      }

      function drawConsciousness(t, speed) {
        const born = smoothstep(0.05, 1.2, t);
        const rush = smoothstep(2.1, 8.6, t);
        const arrival = smoothstep(8.7, 11.2, t);

        const cx = width * 0.5 + Math.sin(t * 0.9) * width * 0.02;
        const cy = height * (0.54 + Math.cos(t * 0.7) * 0.02);
        const radius = width * (0.004 + born * 0.003 + arrival * 0.001);

        const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius * (14 + rush * 8));
        glow.addColorStop(0, `rgba(220, 252, 255, ${0.85 + arrival * 0.15})`);
        glow.addColorStop(0.3, `rgba(132, 231, 255, ${0.55 + rush * 0.35})`);
        glow.addColorStop(1, "rgba(0,0,0,0)");

        ctx.globalCompositeOperation = "lighter";
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * (13 + rush * 7), 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = `rgba(230, 254, 255, ${0.9})`;
        ctx.beginPath();
        ctx.arc(cx, cy, radius * (1.05 + Math.sin(t * 8) * 0.12), 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = `rgba(146, 230, 255, ${0.16 + rush * 0.4})`;
        ctx.lineWidth = Math.max(1, radius * 0.22 * speed);
        ctx.beginPath();
        ctx.moveTo(cx - radius * (30 + rush * 80), cy + radius * 0.8);
        ctx.lineTo(cx - radius * 1.2, cy + radius * 0.1);
        ctx.stroke();
        ctx.globalCompositeOperation = "source-over";
      }

      function drawNexus(t) {
        const pull = smoothstep(8.4, 11.1, t);
        if (pull <= 0) return;

        const cx = width * 0.5;
        const cy = height * 0.5;
        const r = width * (0.03 + pull * 0.06);

        ctx.globalCompositeOperation = "lighter";
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 7);
        g.addColorStop(0, `rgba(217,251,255,${0.36 + pull * 0.58})`);
        g.addColorStop(0.34, `rgba(119,228,255,${0.25 + pull * 0.36})`);
        g.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 7, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 6; i++) {
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(t * 0.4 + i * (Math.PI / 3));
          ctx.strokeStyle = `rgba(150, 236, 255, ${0.18 + pull * 0.34})`;
          ctx.lineWidth = Math.max(1.2, r * 0.03);
          ctx.beginPath();
          ctx.moveTo(r * (1.6 + i * 0.2), 0);
          ctx.lineTo(r * (4.1 + i * 0.3), 0);
          ctx.stroke();
          ctx.restore();
        }

        ctx.fillStyle = `rgba(233,255,255,${0.56 + pull * 0.44})`;
        ctx.beginPath();
        ctx.arc(cx, cy, r * 0.46, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalCompositeOperation = "source-over";
      }

      function drawVignette(t) {
        const arrival = smoothstep(8.6, 11.3, t);
        const edge = ctx.createRadialGradient(width * 0.5, height * 0.5, width * 0.28, width * 0.5, height * 0.5, width * 0.78);
        edge.addColorStop(0, "rgba(0,0,0,0)");
        edge.addColorStop(1, `rgba(0, 0, 0, ${0.52 + arrival * 0.28})`);
        ctx.fillStyle = edge;
        ctx.fillRect(0, 0, width, height);
      }

      function updateStatus(t) {
        const show = smoothstep(9.7, 11.2, t);
        statusEl.textContent = "NEXUS ARRIVAL";
        statusEl.classList.toggle("show", show > 0.08);
        statusEl.style.opacity = String(show);
      }

      function render(now) {
        const t = (now - startTime) / 1000;
        if (t > DURATION) {
          running = false;
          cancelAnimationFrame(raf);
          startBtn.classList.remove("hidden");
          return;
        }

        const awaken = smoothstep(0.25, 1.5, t);
        const accelerate = smoothstep(1.2, 6.8, t);
        const maxRush = smoothstep(5.5, 9.2, t);
        const settle = 1 - smoothstep(9.5, 11.2, t);
        const speed = 0.2 + awaken * 0.5 + accelerate * 1.8 + maxRush * 2.4 * settle;

        const camX = Math.sin(t * 0.42) * 0.06 + Math.sin(t * 1.15) * 0.02;
        const camY = Math.cos(t * 0.31) * 0.05 + Math.sin(t * 0.8 + 1.2) * 0.02;

        ctx.clearRect(0, 0, width, height);
        drawBackground(t);
        drawStars(t, camX, camY, speed);
        drawRails(t, camX, camY, speed);
        drawNodes(t, camX, camY, speed);
        drawRings(t, camX, camY, speed);
        drawConsciousness(t, speed);
        drawNexus(t);
        drawVignette(t);
        updateStatus(t);

        raf = requestAnimationFrame(render);
      }

      function runAudio() {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const master = audio.createGain();
        master.gain.value = 0.2;
        master.connect(audio.destination);

        const now = audio.currentTime;

        const low = audio.createOscillator();
        low.type = "sine";
        low.frequency.setValueAtTime(34, now);
        low.frequency.linearRampToValueAtTime(42, now + 3);
        low.frequency.linearRampToValueAtTime(65, now + 9.2);
        const lowGain = audio.createGain();
        lowGain.gain.setValueAtTime(0.0001, now);
        lowGain.gain.exponentialRampToValueAtTime(0.36, now + 1.3);
        lowGain.gain.linearRampToValueAtTime(0.22, now + DURATION);
        low.connect(lowGain).connect(master);

        const choir = audio.createOscillator();
        choir.type = "triangle";
        choir.frequency.setValueAtTime(96, now + 0.3);
        choir.frequency.exponentialRampToValueAtTime(240, now + 8.9);
        const choirGain = audio.createGain();
        choirGain.gain.setValueAtTime(0.0001, now + 0.3);
        choirGain.gain.exponentialRampToValueAtTime(0.22, now + 4.8);
        choirGain.gain.linearRampToValueAtTime(0.1, now + DURATION);
        choir.connect(choirGain).connect(master);

        const noiseBuffer = audio.createBuffer(1, audio.sampleRate * 0.04, audio.sampleRate);
        const data = noiseBuffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * Math.exp(-i / 160);
        }

        for (let i = 0; i < 34; i++) {
          const src = audio.createBufferSource();
          src.buffer = noiseBuffer;
          const g = audio.createGain();
          const when = now + 1.1 + i * 0.27 + Math.random() * 0.15;
          g.gain.setValueAtTime(0.04, when);
          g.gain.exponentialRampToValueAtTime(0.0001, when + 0.06);
          src.connect(g).connect(master);
          src.start(when);
        }

        const arrival = audio.createOscillator();
        arrival.type = "sawtooth";
        arrival.frequency.setValueAtTime(350, now + 9.3);
        arrival.frequency.exponentialRampToValueAtTime(72, now + 10.7);
        const arrivalGain = audio.createGain();
        arrivalGain.gain.setValueAtTime(0.0001, now + 9.2);
        arrivalGain.gain.exponentialRampToValueAtTime(0.38, now + 9.45);
        arrivalGain.gain.exponentialRampToValueAtTime(0.0001, now + 11.25);
        arrival.connect(arrivalGain).connect(master);

        low.start(now);
        choir.start(now + 0.3);
        arrival.start(now + 9.2);

        low.stop(now + DURATION + 0.2);
        choir.stop(now + DURATION + 0.2);
        arrival.stop(now + DURATION + 0.2);
      }

      function begin() {
        if (running) return;
        running = true;
        startBtn.classList.add("hidden");
        statusEl.classList.remove("show");
        statusEl.textContent = "";
        startTime = performance.now();
        runAudio();
        raf = requestAnimationFrame(render);
      }

      window.addEventListener("resize", resize);
      startBtn.addEventListener("click", begin);
      resize();
      drawBackground(0);
      drawConsciousness(0, 0.2);
    </script>
  </body>
</html>
